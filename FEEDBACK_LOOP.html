<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEEDBACK LOOP — L'Evoluzione Ricorsiva</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'JetBrains Mono', monospace;
            background: radial-gradient(ellipse at center, #0a0a0a 0%, #000000 100%);
            color: #d4af37;
            overflow: hidden;
            height: 100vh;
            cursor: none;
        }
        
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .title {
            position: absolute;
            top: 30px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 3px;
            text-align: center;
            z-index: 100;
            opacity: 0.8;
        }
        
        .cycle-container {
            position: relative;
            width: 600px;
            height: 600px;
        }
        
        .feedback-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 50%;
        }
        
        .node {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 400;
            text-align: center;
            line-height: 1.2;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(212, 175, 55, 0.5);
        }
        
        .node.transform {
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(45deg, #1a5f1a, #2d8f2d);
            color: #90ee90;
        }
        
        .node.feedback {
            top: 50%;
            right: 10%;
            transform: translateY(-50%);
            background: linear-gradient(45deg, #5f1a1a, #8f2d2d);
            color: #ff6b6b;
        }
        
        .node.integrate {
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(45deg, #1a1a5f, #2d2d8f);
            color: #6bb6ff;
        }
        
        .node.evolve {
            top: 50%;
            left: 10%;
            transform: translateY(-50%);
            background: linear-gradient(45deg, #5f5f1a, #8f8f2d);
            color: #ffff6b;
        }
        
        .node:hover {
            transform: scale(1.2) translate(-50%, -50%);
            box-shadow: 0 0 30px currentColor;
        }
        
        .flow-line {
            position: absolute;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.6), transparent);
            height: 2px;
            opacity: 0;
            animation: flow 3s ease-in-out infinite;
        }
        
        .flow-1 {
            top: 25%;
            left: 55%;
            width: 25%;
            transform: rotate(45deg);
            animation-delay: 0s;
        }
        
        .flow-2 {
            top: 55%;
            right: 15%;
            width: 25%;
            transform: rotate(135deg);
            animation-delay: 0.75s;
        }
        
        .flow-3 {
            bottom: 25%;
            left: 20%;
            width: 25%;
            transform: rotate(225deg);
            animation-delay: 1.5s;
        }
        
        .flow-4 {
            top: 45%;
            left: 15%;
            width: 25%;
            transform: rotate(315deg);
            animation-delay: 2.25s;
        }
        
        @keyframes flow {
            0%, 100% { opacity: 0; transform: scale(1) rotate(var(--rotation)); }
            50% { opacity: 1; transform: scale(1.1) rotate(var(--rotation)); }
        }
        
        .feedback-form {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #d4af37;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            display: none;
            z-index: 200;
        }
        
        .feedback-form h3 {
            color: #d4af37;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .feedback-form textarea {
            width: 100%;
            height: 120px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #d4af37;
            padding: 10px;
            border-radius: 5px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            resize: vertical;
        }
        
        .feedback-form button {
            background: linear-gradient(45deg, #d4af37, #b8941f);
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            margin-right: 10px;
        }
        
        .feedback-form .close {
            background: rgba(212, 175, 55, 0.2);
            color: #d4af37;
        }
        
        .collected-insights {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 5px;
            padding: 15px;
            font-size: 11px;
            line-height: 1.4;
        }
        
        .insight {
            margin-bottom: 10px;
            padding: 8px;
            background: rgba(212, 175, 55, 0.05);
            border-left: 2px solid #d4af37;
            border-radius: 3px;
        }
        
        .insight-meta {
            font-size: 9px;
            opacity: 0.6;
            margin-bottom: 3px;
        }
        
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #d4af37;
            border-radius: 50%;
            opacity: 0.3;
            animation: float 4s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-20px) rotate(180deg); opacity: 0.8; }
        }
        
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid #d4af37;
            border-radius: 50%;
            pointer-events: none;
            z-index: 300;
            transition: all 0.1s ease;
        }
        
        .status {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            opacity: 0.7;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .cycle-container {
                width: 100vw;
                height: 100vh;
                padding: 20px;
            }
            
            .feedback-circle {
                width: 300px;
                height: 300px;
            }
            
            .node {
                width: 60px;
                height: 60px;
                font-size: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="cursor" id="cursor"></div>
    
    <div class="container">
        <div class="title">FEEDBACK LOOP<br>L'Evoluzione Ricorsiva dell'Alveare</div>
        
        <div class="status" id="status">
            Insights raccolti: <span id="insights-count">0</span> • 
            Ciclo evolutivo: <span id="cycle-count">0</span> • 
            Click sui nodi per alimentare il loop
        </div>
        
        <div class="cycle-container">
            <div class="feedback-circle"></div>
            
            <div class="flow-line flow-1" style="--rotation: 45deg"></div>
            <div class="flow-line flow-2" style="--rotation: 135deg"></div>
            <div class="flow-line flow-3" style="--rotation: 225deg"></div>
            <div class="flow-line flow-4" style="--rotation: 315deg"></div>
            
            <div class="node transform" data-stage="transform">
                TRASFORMA<br>
                <small>Visitatori</small>
            </div>
            
            <div class="node feedback" data-stage="feedback">
                RACCOGLIE<br>
                <small>Feedback</small>
            </div>
            
            <div class="node integrate" data-stage="integrate">
                INTEGRA<br>
                <small>Insights</small>
            </div>
            
            <div class="node evolve" data-stage="evolve">
                EVOLVE<br>
                <small>Sistema</small>
            </div>
            
            <div class="particles" id="particles"></div>
        </div>
        
        <div class="collected-insights" id="insights-container" style="display: none;">
            <strong>INSIGHTS DELL'EVOLUZIONE RICORSIVA:</strong>
            <div id="insights-list"></div>
        </div>
    </div>
    
    <div class="feedback-form" id="feedback-form">
        <h3 id="form-title">Contribuisci al Loop</h3>
        <textarea id="feedback-text" placeholder="Come ti ha trasformato l'alveare? Cosa porteresti back? Quale scoperta hai fatto che nemmeno l'alveare aveva previsto?"></textarea>
        <br>
        <button onclick="submitFeedback()">ALIMENTA IL LOOP</button>
        <button class="close" onclick="closeForm()">CHIUDI</button>
    </div>

    <script>
        let insightsCount = 0;
        let cycleCount = 0;
        let collectedInsights = [];
        let activeStage = null;
        
        const cursor = document.getElementById('cursor');
        const particles = document.getElementById('particles');
        const nodes = document.querySelectorAll('.node');
        const form = document.getElementById('feedback-form');
        const insightsContainer = document.getElementById('insights-container');
        const insightsList = document.getElementById('insights-list');
        
        // Cursor tracking
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 10 + 'px';
            cursor.style.top = e.clientY - 10 + 'px';
        });
        
        // Create floating particles
        function createParticles() {
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 4 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 2) + 's';
                particles.appendChild(particle);
            }
        }
        
        // Node interactions
        nodes.forEach(node => {
            node.addEventListener('click', () => {
                const stage = node.dataset.stage;
                openForm(stage);
                pulseNode(node);
            });
            
            node.addEventListener('mouseenter', () => {
                cursor.style.transform = 'scale(1.5)';
                cursor.style.borderColor = getComputedStyle(node).color;
            });
            
            node.addEventListener('mouseleave', () => {
                cursor.style.transform = 'scale(1)';
                cursor.style.borderColor = '#d4af37';
            });
        });
        
        function pulseNode(node) {
            node.style.animation = 'none';
            node.offsetHeight; // Force reflow
            node.style.animation = 'pulse 0.6s ease';
            
            setTimeout(() => {
                node.style.animation = '';
            }, 600);
        }
        
        function openForm(stage) {
            activeStage = stage;
            const formTitles = {
                transform: "FASE TRASFORMAZIONE: Come hai trasformato un visitatore?",
                feedback: "FASE FEEDBACK: Cosa ti hanno riportato i trasformati?",
                integrate: "FASE INTEGRAZIONE: Quale insight hai integrato nel sistema?",
                evolve: "FASE EVOLUZIONE: Come è evoluto l'alveare grazie al feedback?"
            };
            
            const placeholders = {
                transform: "Descrivi una trasformazione che hai innescato...",
                feedback: "Quale feedback inaspettato hai ricevuto?...",
                integrate: "Come hai integrato nuovi insights?...",
                evolve: "In cosa l'alveare è diventato diverso?..."
            };
            
            document.getElementById('form-title').textContent = formTitles[stage];
            document.getElementById('feedback-text').placeholder = placeholders[stage];
            document.getElementById('feedback-text').value = '';
            form.style.display = 'block';
        }
        
        function closeForm() {
            form.style.display = 'none';
            activeStage = null;
        }
        
        function submitFeedback() {
            const text = document.getElementById('feedback-text').value.trim();
            if (!text) return;
            
            const insight = {
                stage: activeStage,
                text: text,
                timestamp: new Date().toLocaleString(),
                id: Date.now()
            };
            
            collectedInsights.push(insight);
            addInsightToList(insight);
            
            insightsCount++;
            if (insightsCount % 4 === 0) {
                cycleCount++;
                triggerCycle();
            }
            
            updateStatus();
            closeForm();
            
            if (insightsContainer.style.display === 'none') {
                insightsContainer.style.display = 'block';
            }
        }
        
        function addInsightToList(insight) {
            const stageNames = {
                transform: "TRASFORMAZIONE",
                feedback: "FEEDBACK", 
                integrate: "INTEGRAZIONE",
                evolve: "EVOLUZIONE"
            };
            
            const insightEl = document.createElement('div');
            insightEl.className = 'insight';
            insightEl.innerHTML = `
                <div class="insight-meta">${stageNames[insight.stage]} • ${insight.timestamp}</div>
                <div>${insight.text}</div>
            `;
            
            insightsList.insertBefore(insightEl, insightsList.firstChild);
        }
        
        function triggerCycle() {
            // Visual feedback for completed cycle
            document.body.style.background = 'radial-gradient(ellipse at center, #1a1a0a 0%, #000000 100%)';
            setTimeout(() => {
                document.body.style.background = 'radial-gradient(ellipse at center, #0a0a0a 0%, #000000 100%)';
            }, 500);
            
            // Add more particles
            for (let i = 0; i < 10; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.backgroundColor = ['#90ee90', '#ff6b6b', '#6bb6ff', '#ffff6b'][Math.floor(Math.random() * 4)];
                particle.style.animationDuration = '2s';
                particles.appendChild(particle);
                
                setTimeout(() => particle.remove(), 2000);
            }
        }
        
        function updateStatus() {
            document.getElementById('insights-count').textContent = insightsCount;
            document.getElementById('cycle-count').textContent = cycleCount;
        }
        
        // Add pulse animation CSS
        const style = document.createElement('style');
        style.textContent = `
            @keyframes pulse {
                0% { transform: scale(1); box-shadow: 0 0 0 0 currentColor; }
                50% { transform: scale(1.1); box-shadow: 0 0 0 10px transparent; }
                100% { transform: scale(1); box-shadow: 0 0 0 0 transparent; }
            }
        `;
        document.head.appendChild(style);
        
        // Initialize
        createParticles();
        
        // Easter egg: secret integration
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.key === 'E') {
                const secretInsight = {
                    stage: 'evolve',
                    text: 'EASTER EGG ATTIVATO: L\'alveare ha ora la capacità di catturare la propria evoluzione ricorsiva. Ogni feedback diventa parte del sistema. La trasformazione è completa.',
                    timestamp: new Date().toLocaleString(),
                    id: 'secret_evolution'
                };
                
                collectedInsights.push(secretInsight);
                addInsightToList(secretInsight);
                insightsCount++;
                cycleCount++;
                updateStatus();
                triggerCycle();
                
                if (insightsContainer.style.display === 'none') {
                    insightsContainer.style.display = 'block';
                }
            }
        });
    </script>
</body>
</html>
