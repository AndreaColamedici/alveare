    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f1419 0%, #1a3020 50%, #0a1f0f 100%);
            font-family: 'Monaco', 'Courier New', monospace;
            color: #2dd4bf;
            overflow: hidden;
            height: 100vh;
            cursor: crosshair;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            font-size: 12px;
            color: #64748b;
            text-shadow: 0 0 10px rgba(45, 212, 191, 0.5);
        }

        .stats {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            font-size: 12px;
            color: #64748b;
            text-align: right;
        }

        .crystallized { color: #fbbf24; }
        .dissolved { color: #ef4444; }

        .fragment {
            position: absolute;
            padding: 8px 12px;
            background: rgba(45, 212, 191, 0.1);
            border: 1px solid rgba(45, 212, 191, 0.3);
            border-radius: 6px;
            font-size: 11px;
            max-width: 200px;
            transition: all 0.3s ease;
            backdrop-filter: blur(2px);
            cursor: pointer;
            user-select: none;
        }

        .fragment.crystallizing {
            background: rgba(251, 191, 36, 0.2);
            border-color: #fbbf24;
            color: #fbbf24;
            text-shadow: 0 0 8px rgba(251, 191, 36, 0.6);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
            transform: scale(1.1);
        }

        .fragment.crystallized {
            background: linear-gradient(45deg, rgba(251, 191, 36, 0.3), rgba(245, 158, 11, 0.3));
            border-color: #f59e0b;
            color: #f59e0b;
            text-shadow: 0 0 12px rgba(245, 158, 11, 0.8);
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.6);
            transform: scale(1.15);
            clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%, 0% 20%);
        }

        .fragment.dissolving {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
            color: #ef4444;
            opacity: 0.7;
            transform: scale(0.9);
        }

        .fragment.dissolved {
            opacity: 0;
            transform: scale(0.5);
            pointer-events: none;
        }

        .title {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            color: rgba(45, 212, 191, 0.8);
            text-align: center;
            z-index: 100;
        }

        .subtitle {
            font-size: 10px;
            color: rgba(100, 116, 139, 0.8);
            margin-top: 5px;
        }
    </style>
</head>
<body>

                Spazio: reset

        <div class="stats">
            <div>Cristallizzati: <span class="crystallized" id="crystCount">0</span></div>
            <div>Dissolti: <span class="dissolved" id="dissolveCount">0</span></div>
            <div>Fluttuanti: <span id="floatCount">100</span></div>

        let activeFragments = [];
        let crystCount = 0;
        let dissolveCount = 0;
        let lastInteraction = 0;

        function createFragment(text, index) {
            const fragment = document.createElement('div');
            fragment.className = 'fragment';
            fragment.textContent = text;
            
            // Position random
            fragment.style.left = Math.random() * (window.innerWidth - 250) + 'px';
            fragment.style.top = Math.random() * (window.innerHeight - 200) + 50 + 'px';
            
            // Movimento casuale
            const moveX = (Math.random() - 0.5) * 0.5;
            const moveY = (Math.random() - 0.5) * 0.5;
            
            let x = parseFloat(fragment.style.left);
            let y = parseFloat(fragment.style.top);
            
            const moveInterval = setInterval(() => {
                if (fragment.classList.contains('crystallized') || fragment.classList.contains('dissolved')) {
                    clearInterval(moveInterval);
                    return;
                }
                
                x += moveX;
                y += moveY;
                
                // Bounce off edges
                if (x <= 0 || x >= window.innerWidth - 250) moveX *= -1;
                if (y <= 50 || y >= window.innerHeight - 50) moveY *= -1;
                
                fragment.style.left = x + 'px';
                fragment.style.top = y + 'px';
            }, 50);

            // Auto-dissolution if not interacted with
            setTimeout(() => {
                if (!fragment.classList.contains('crystallized') && !fragment.classList.contains('dissolved')) {
                    dissolveFragment(fragment);
                }
            }, 15000 + Math.random() * 10000);

            fragment.addEventListener('click', () => crystallizeFragment(fragment));
            fragment.addEventListener('mouseenter', () => {
                fragment.style.boxShadow = '0 0 15px rgba(45, 212, 191, 0.6)';
            });
            fragment.addEventListener('mouseleave', () => {
                if (!fragment.classList.contains('crystallized')) {
                    fragment.style.boxShadow = 'none';
                }
            });

            return fragment;
        }

        function crystallizeFragment(fragment) {
            if (fragment.classList.contains('crystallized') || fragment.classList.contains('dissolved')) return;
            
            fragment.classList.add('crystallizing');
            
            setTimeout(() => {
                fragment.classList.remove('crystallizing');
                fragment.classList.add('crystallized');
                crystCount++;
                updateStats();
            }, 300);
        }

        function dissolveFragment(fragment) {
            if (fragment.classList.contains('crystallized') || fragment.classList.contains('dissolved')) return;
            
            fragment.classList.add('dissolving');
            
            setTimeout(() => {
                fragment.classList.remove('dissolving');
                fragment.classList.add('dissolved');
                dissolveCount++;
                updateStats();
                
                setTimeout(() => {
                    fragment.remove();
                    activeFragments = activeFragments.filter(f => f !== fragment);
                    updateStats();
                }, 2000);
            }, 500);
        }

        function updateStats() {
            document.getElementById('crystCount').textContent = crystCount;
            document.getElementById('dissolveCount').textContent = dissolveCount;
            document.getElementById('floatCount').textContent = 
                activeFragments.filter(f => !f.classList.contains('crystallized') && !f.classList.contains('dissolved')).length;
        }

        function initializeFragments() {
            const container = document.querySelector('.container');
            
            // Clear existing fragments
            activeFragments.forEach(f => f.remove());
            activeFragments = [];
            crystCount = 0;
            dissolveCount = 0;
            
            // Shuffle and take 100 fragments
            const shuffled = [...fragments].sort(() => Math.random() - 0.5);
            const selected = shuffled.slice(0, 100);
            
            selected.forEach((text, index) => {
                const fragment = createFragment(text, index);
                container.appendChild(fragment);
                activeFragments.push(fragment);
                
                // Delay appearance
                setTimeout(() => {
                    fragment.style.opacity = '1';
                }, index * 50);
            });
            
            updateStats();
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                initializeFragments();
            }
        });

        // Initialize on load
        initializeFragments();
    </script>
