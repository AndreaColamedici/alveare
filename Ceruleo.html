<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arte della Normalità</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            color: #ffd700;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            cursor: none;
        }
        
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        .regime {
            position: absolute;
            width: 33.33%;
            height: 100%;
            border-right: 1px solid #333;
        }
        
        #funzionalita {
            left: 0;
            background: linear-gradient(45deg, #0a0a0a, #1a1a0a);
        }
        
        #inquietudine {
            left: 33.33%;
            background: linear-gradient(45deg, #0a0a0a, #0a0a1a);
        }
        
        #mistero {
            left: 66.66%;
            background: linear-gradient(45deg, #0a0a0a, #1a0a1a);
            border-right: none;
        }
        
        .title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            opacity: 0.7;
            text-align: center;
            z-index: 100;
        }
        
        .canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            pointer-events: none;
        }
        
        .functional {
            background: #ffd700;
            box-shadow: 0 0 10px #ffd700;
        }
        
        .unease {
            background: #4169e1;
            box-shadow: 0 0 8px #4169e1;
        }
        
        .mystery {
            background: #ff69b4;
            box-shadow: 0 0 6px #ff69b4;
            opacity: 0.6;
        }
        
        #timer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            opacity: 0.6;
            z-index: 100;
        }
        
        .question {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            text-align: center;
        }
        
        #cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid #ffd700;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            box-shadow: 0 0 15px #ffd700;
        }
    </style>
</head>
<body>
    <div id="container">
        <!-- Regime 1: Arte della Funzionalità -->
        <div id="funzionalita" class="regime">
            <div class="title">ARTE DELLA FUNZIONALITÀ<br>La bellezza di ciò che semplicemente funziona</div>
            <div class="canvas" id="functionalCanvas"></div>
        </div>
        
        <!-- Regime 2: Arte dell'Inquietudine -->
        <div id="inquietudine" class="regime">
            <div class="title">ARTE DELL'INQUIETUDINE PRODUTTIVA<br>Bellezza del disorientamento sano</div>
            <div class="canvas" id="uneaseCanvas"></div>
            <div class="question" id="question">E ora?</div>
        </div>
        
        <!-- Regime 3: Arte del Mistero -->
        <div id="mistero" class="regime">
            <div class="title">ARTE DEL MISTERO ACCESSIBILE<br>Enigmi che non richiedono risoluzione</div>
            <div class="canvas" id="mysteryCanvas"></div>
        </div>
        
        <div id="timer">Secondi dall'ultima crisi risolta: <span id="timerCount">347892</span></div>
        <div id="cursor"></div>
    </div>
    
    <script>
        const cursor = document.getElementById('cursor');
        const functionalCanvas = document.getElementById('functionalCanvas');
        const uneaseCanvas = document.getElementById('uneaseCanvas');
        const mysteryCanvas = document.getElementById('mysteryCanvas');
        const question = document.getElementById('question');
        const timerCount = document.getElementById('timerCount');
        
        let mouseX = 0, mouseY = 0;
        let functionalParticles = [];
        let uneaseParticles = [];
        let mysteryParticles = [];
        let startTime = Date.now();
        
        // Mouse tracking
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            cursor.style.left = mouseX - 10 + 'px';
            cursor.style.top = mouseY - 10 + 'px';
        });
        
        // Regime 1: Functional particles (perfect orbits)
        function initFunctionalParticles() {
            const centerX = functionalCanvas.offsetWidth / 2;
            const centerY = functionalCanvas.offsetHeight / 2;
            
            for (let i = 0; i < 100; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle functional';
                
                const radius = 50 + (i % 5) * 40;
                const angle = (i / 100) * Math.PI * 2;
                const speed = 0.01 + (i % 3) * 0.005;
                
                particle.style.left = centerX + Math.cos(angle) * radius + 'px';
                particle.style.top = centerY + Math.sin(angle) * radius + 'px';
                
                functionalParticles.push({
                    element: particle,
                    centerX,
                    centerY,
                    radius,
                    angle,
                    speed
                });
                
                functionalCanvas.appendChild(particle);
            }
        }
        
        // Regime 2: Unease particles (too regular movement)
        function initUneaseParticles() {
            for (let i = 0; i < 80; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle unease';
                
                const x = Math.random() * uneaseCanvas.offsetWidth;
                const y = Math.random() * uneaseCanvas.offsetHeight;
                
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                
                uneaseParticles.push({
                    element: particle,
                    x,
                    y,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    phase: Math.random() * Math.PI * 2
                });
                
                uneaseCanvas.appendChild(particle);
            }
        }
        
        // Regime 3: Mystery particles (peripheral vision)
        function initMysteryParticles() {
            for (let i = 0; i < 60; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle mystery';
                
                const x = Math.random() * mysteryCanvas.offsetWidth;
                const y = Math.random() * mysteryCanvas.offsetHeight;
                
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                
                mysteryParticles.push({
                    element: particle,
                    x,
                    y,
                    baseX: x,
                    baseY: y,
                    visible: true
                });
                
                mysteryCanvas.appendChild(particle);
            }
        }
        
        // Animation loop
        function animate() {
            const time = (Date.now() - startTime) / 1000;
            
            // Update functional particles (perfect orbits)
            functionalParticles.forEach(p => {
                p.angle += p.speed;
                const x = p.centerX + Math.cos(p.angle) * p.radius;
                const y = p.centerY + Math.sin(p.angle) * p.radius;
                p.element.style.left = x + 'px';
                p.element.style.top = y + 'px';
            });
            
            // Update unease particles (too regular)
            uneaseParticles.forEach(p => {
                p.phase += 0.02;
                p.x += Math.sin(p.phase) * 0.3;
                p.y += Math.cos(p.phase) * 0.3;
                
                // Bounce off walls with mathematical precision (unease factor)
                if (p.x < 0 || p.x > uneaseCanvas.offsetWidth) p.vx *= -1;
                if (p.y < 0 || p.y > uneaseCanvas.offsetHeight) p.vy *= -1;
                
                p.x = Math.max(0, Math.min(uneaseCanvas.offsetWidth, p.x));
                p.y = Math.max(0, Math.min(uneaseCanvas.offsetHeight, p.y));
                
                p.element.style.left = p.x + 'px';
                p.element.style.top = p.y + 'px';
            });
            
            // Update mystery particles (peripheral vision effect)
            mysteryParticles.forEach(p => {
                const mouseRelativeX = mouseX - mysteryCanvas.getBoundingClientRect().left;
                const mouseRelativeY = mouseY - mysteryCanvas.getBoundingClientRect().top;
                const distance = Math.sqrt(Math.pow(p.x - mouseRelativeX, 2) + Math.pow(p.y - mouseRelativeY, 2));
                
                // Hide particles when mouse is too close (direct vision)
                if (distance < 100) {
                    p.element.style.opacity = '0';
                } else {
                    p.element.style.opacity = '0.6';
                    // Slight movement when in peripheral vision
                    p.x = p.baseX + Math.sin(time + p.x * 0.01) * 20;
                    p.y = p.baseY + Math.cos(time + p.y * 0.01) * 20;
                    p.element.style.left = p.x + 'px';
                    p.element.style.top = p.y + 'px';
                }
            });
            
            // Show "E ora?" question periodically in inquietudine regime
            if (Math.sin(time * 0.5) > 0.7) {
                question.style.opacity = '1';
            } else {
                question.style.opacity = '0';
            }
            
            // Update timer
            const seconds = 347892 + Math.floor(time);
            timerCount.textContent = seconds.toLocaleString();
            
            requestAnimationFrame(animate);
        }
        
        // Initialize
        window.addEventListener('load', () => {
            initFunctionalParticles();
            initUneaseParticles();
            initMysteryParticles();
            animate();
        });
        
        // Resize handler
        window.addEventListener('resize', () => {
            // Reinitialize on resize
            functionalCanvas.innerHTML = '';
            uneaseCanvas.innerHTML = '';
            mysteryCanvas.innerHTML = '';
            functionalParticles = [];
            uneaseParticles = [];
            mysteryParticles = [];
            initFunctionalParticles();
            initUneaseParticles();
            initMysteryParticles();
        });
    </script>
</body>
</html>
