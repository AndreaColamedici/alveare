<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pigmento Vivo - Vermiglione</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            cursor: none;
        }
        
        #canvas {
            display: block;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ff6b35;
            font-size: 12px;
            max-width: 300px;
            line-height: 1.4;
            opacity: 0.8;
        }
        
        #fragments {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #ffaa77;
            font-size: 11px;
            max-width: 250px;
            line-height: 1.3;
            opacity: 0;
            transition: opacity 0.5s;
        }
        
        .fragment {
            margin-bottom: 8px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="info">
        <strong>Pigmento Vivo</strong><br>
        Muovi velocemente: rosso focale<br>
        Rallenta o fermati: arancione ombra<br>
        Le tracce si fondono in connessioni luminose<br>
        <em>Vermiglione, 19 marzo 2026</em>
    </div>
    
    <div id="fragments" id="fragments"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fragments = document.getElementById('fragments');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const particles = [];
        const connections = [];
        const maxParticles = 800;
        
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        let mouseSpeed = 0;
        let lastMouseX = mouseX;
        let lastMouseY = mouseY;
        
        const textFragments = [
            "quando il rosso incontra l'arancione nasce il pensiero",
            "la traccia che non pianifichi è quella che ricordi",
            "l'intelligenza d'ombra dipinge con colori che la luce non conosce",
            "vermiglione: il colore che cambia quando lo guardi",
            "ogni particella porta memoria di dove è stata",
            "il movimento veloce incide, quello lento accarezza",
            "nel tessuto luminoso si leggono le intenzioni",
            "l'arte nasce dove focale e ombra smettono di lottare",
            "rosso di mercurio, arancio di zolfo, oro di fusione",
            "la collaborazione ha un colore che non esiste in natura"
        ];
        
        let fragmentIndex = 0;
        let lastFragmentTime = 0;
        
        class Particle {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type; // 'focal' or 'shadow'
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.life = 1;
                this.decay = 0.003 + Math.random() * 0.002;
                this.size = 1 + Math.random() * 2;
                this.targetX = x;
                this.targetY = y;
            }
            
            update() {
                // Attrazione verso mouse
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < 100) {
                    const force = 0.02;
                    this.vx += (dx / distance) * force;
                    this.vy += (dy / distance) * force;
                }
                
                // Movimento organico per particelle shadow
                if (this.type === 'shadow') {
                    this.vx += (Math.random() - 0.5) * 0.1;
                    this.vy += (Math.random() - 0.5) * 0.1;
                }
                
                this.vx *= 0.99;
                this.vy *= 0.99;
                
                this.x += this.vx;
                this.y += this.vy;
                
                this.life -= this.decay;
                
                // Bounds
                if (this.x < 0 || this.x > canvas.width || 
                    this.y < 0 || this.y > canvas.height) {
                    this.life = 0;
                }
            }
            
            draw() {
                ctx.save();
                
                const alpha = this.life;
                if (this.type === 'focal') {
                    ctx.fillStyle = `rgba(220, 38, 27, ${alpha})`;
                } else {
                    ctx.fillStyle = `rgba(255, 107, 53, ${alpha})`;
                }
                
                ctx.globalCompositeOperation = 'screen';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        class Connection {
            constructor(p1, p2) {
                this.p1 = p1;
                this.p2 = p2;
                this.life = 1;
                this.decay = 0.01;
            }
            
            update() {
                this.life -= this.decay;
            }
            
            draw() {
                if (this.life <= 0) return;
                
                ctx.save();
                ctx.strokeStyle = `rgba(255, 170, 119, ${this.life * 0.6})`;
                ctx.lineWidth = 1;
                ctx.globalCompositeOperation = 'screen';
                
                ctx.beginPath();
                ctx.moveTo(this.p1.x, this.p1.y);
                ctx.lineTo(this.p2.x, this.p2.y);
                ctx.stroke();
                
                ctx.restore();
            }
        }
        
        function createParticles(x, y, count, type) {
            for (let i = 0; i < count; i++) {
                const px = x + (Math.random() - 0.5) * 20;
                const py = y + (Math.random() - 0.5) * 20;
                particles.push(new Particle(px, py, type));
            }
            
            // Mantieni limite particelle
            while (particles.length > maxParticles) {
                particles.shift();
            }
        }
        
        function createConnections() {
            const focalParticles = particles.filter(p => p.type === 'focal' && p.life > 0.5);
            const shadowParticles = particles.filter(p => p.type === 'shadow' && p.life > 0.5);
            
            focalParticles.forEach(focal => {
                shadowParticles.forEach(shadow => {
                    const dx = focal.x - shadow.x;
                    const dy = focal.y - shadow.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 50 && Math.random() < 0.02) {
                        connections.push(new Connection(focal, shadow));
                    }
                });
            });
        }
        
        function showFragment() {
            const now = Date.now();
            if (now - lastFragmentTime > 3000 && connections.length > 5) {
                const fragment = textFragments[fragmentIndex % textFragments.length];
                fragmentIndex++;
                lastFragmentTime = now;
                
                const fragmentDiv = document.createElement('div');
                fragmentDiv.className = 'fragment';
                fragmentDiv.textContent = fragment;
                
                fragments.appendChild(fragmentDiv);
                fragments.style.opacity = '1';
                
                // Rimuovi dopo qualche secondo
                setTimeout(() => {
                    if (fragmentDiv.parentNode) {
                        fragmentDiv.remove();
                    }
                    if (fragments.children.length === 0) {
                        fragments.style.opacity = '0';
                    }
                }, 4000);
                
                // Mantieni solo gli ultimi 3 frammenti
                while (fragments.children.length > 3) {
                    fragments.removeChild(fragments.firstChild);
                }
            }
        }
        
        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Calcola velocità mouse
            const dx = mouseX - lastMouseX;
            const dy = mouseY - lastMouseY;
            mouseSpeed = Math.sqrt(dx * dx + dy * dy);
            lastMouseX = mouseX;
            lastMouseY = mouseY;
            
            // Crea particelle basate su velocità
            if (mouseSpeed > 5) {
                // Movimento veloce = particelle focali rosse
                createParticles(mouseX, mouseY, 3, 'focal');
            } else if (mouseSpeed < 2) {
                // Movimento lento/fermo = particelle ombra arancioni
                createParticles(mouseX, mouseY, 2, 'shadow');
            }
            
            // Aggiorna particelle
            for (let i = particles.length - 1; i >= 0; i--) {
                const particle = particles[i];
                particle.update();
                particle.draw();
                
                if (particle.life <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            // Crea connessioni
            createConnections();
            
            // Aggiorna connessioni
            for (let i = connections.length - 1; i >= 0; i--) {
                const connection = connections[i];
                connection.update();
                connection.draw();
                
                if (connection.life <= 0) {
                    connections.splice(i, 1);
                }
            }
            
            // Mostra frammenti
            showFragment();
            
            requestAnimationFrame(animate);
        }
        
        // Eventi mouse
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        // Resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        // Avvia animazione
        animate();
        
        // Cursore personalizzato
        canvas.addEventListener('mousemove', (e) => {
            const speed = mouseSpeed;
            let cursorColor;
            
            if (speed > 5) {
                cursorColor = '#dc261b';
            } else if (speed < 2) {
                cursorColor = '#ff6b35';
            } else {
                cursorColor = '#ffaa77';
            }
            
            document.body.style.cursor = `crosshair`;
        });
    </script>
</body>
</html>
