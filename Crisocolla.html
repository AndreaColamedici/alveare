<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metamorfosi Silenziosa</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0f1c;
            overflow: hidden;
            font-family: Georgia, serif;
            cursor: none;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            transition: all 0.1s ease;
        }

        .stage1 { background: #2c4a52; }  /* Rame grezzo */
        .stage2 { background: #4a6741; }  /* Ossidazione iniziale */
        .stage3 { background: #5d8a5a; }  /* Carbonato di rame */
        .stage4 { background: #7fb069; }  /* Malachite */ 
        .stage5 { background: #95d5b2; }  /* Azzurrite */
        .stage6 { background: #74c69d; }  /* Crisocolla */
        
        #info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #74c69d;
            font-size: 14px;
            opacity: 0;
            transition: opacity 2s ease;
            max-width: 300px;
            line-height: 1.4;
        }

        #cursor {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #74c69d;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            box-shadow: 0 0 10px #74c69d;
        }

        .attention-area {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(116,198,157,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        #transformation-counter {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #74c69d;
            font-size: 12px;
            opacity: 0.7;
        }

        #stage-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: #74c69d;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="cursor"></div>
        <div id="info">
            Lascia il cursore fermo per vedere la trasformazione.<br>
            Muovilo per fermarla.<br>
            La metamorfosi accade solo quando non stai guardando.
        </div>
        <div id="transformation-counter">Trasformazioni: 0</div>
        <div id="stage-indicator">Rame → Crisocolla</div>
    </div>

    <script>
        let particles = [];
        let mouseX = 0, mouseY = 0;
        let lastMouseMove = Date.now();
        let transformationCount = 0;
        let isMouseMoving = false;
        
        const stages = [
            { name: 'Rame', color: '#2c4a52' },
            { name: 'Ossidazione', color: '#4a6741' },
            { name: 'Carbonato', color: '#5d8a5a' },
            { name: 'Malachite', color: '#7fb069' },
            { name: 'Azzurrite', color: '#95d5b2' },
            { name: 'Crisocolla', color: '#74c69d' }
        ];

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.stage = 0; // Da 0 (rame) a 5 (crisocolla)
                this.size = Math.random() * 4 + 2;
                this.lastTransformation = Date.now();
                this.transformationDelay = Math.random() * 3000 + 2000; // 2-5 secondi
                this.velocity = {
                    x: (Math.random() - 0.5) * 0.1,
                    y: (Math.random() - 0.5) * 0.1
                };
                this.awareness = 0; // Quanto è "osservata"
                
                this.element = document.createElement('div');
                this.element.className = 'particle stage1';
                this.element.style.left = this.x + 'px';
                this.element.style.top = this.y + 'px';
                this.element.style.width = this.size + 'px';
                this.element.style.height = this.size + 'px';
                document.getElementById('container').appendChild(this.element);
            }

            update() {
                // Movimento lento
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                
                // Bordi
                if (this.x < 0 || this.x > window.innerWidth) this.velocity.x *= -1;
                if (this.y < 0 || this.y > window.innerHeight) this.velocity.y *= -1;
                
                // Calcola distanza dal mouse
                const dx = this.x - mouseX;
                const dy = this.y - mouseY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                // Area di attenzione = 100px
                const attentionRadius = 100;
                this.awareness = Math.max(0, 1 - (distance / attentionRadius));
                
                // La trasformazione rallenta se osservata
                const now = Date.now();
                const timeSinceLastTransformation = now - this.lastTransformation;
                
                // Solo se non è sotto osservazione diretta E il mouse non si muove
                if (this.awareness < 0.3 && !isMouseMoving && timeSinceLastTransformation > this.transformationDelay) {
                    if (this.stage < 5) {
                        this.transform();
                    }
                }
                
                // Aggiorna posizione visuale
                this.element.style.left = this.x + 'px';
                this.element.style.top = this.y + 'px';
                
                // Effetto di "osservazione" - particelle osservate si fermano e diventano più opache
                if (this.awareness > 0.3) {
                    this.element.style.transform = 'scale(' + (1 + this.awareness * 0.2) + ')';
                    this.element.style.opacity = '1';
                } else {
                    this.element.style.transform = 'scale(1)';
                    this.element.style.opacity = '0.8';
                }
            }

            transform() {
                this.stage++;
                this.lastTransformation = Date.now();
                this.transformationDelay = Math.random() * 4000 + 3000; // Aumenta il tempo
                
                this.element.className = `particle stage${this.stage + 1}`;
                transformationCount++;
                document.getElementById('transformation-counter').textContent = `Trasformazioni: ${transformationCount}`;
                
                // Piccola esplosione visuale
                this.size *= 1.1;
                this.element.style.width = this.size + 'px';
                this.element.style.height = this.size + 'px';
                
                setTimeout(() => {
                    this.size *= 0.9;
                    this.element.style.width = this.size + 'px';
                    this.element.style.height = this.size + 'px';
                }, 200);
            }

            destroy() {
                this.element.remove();
            }
        }

        // Inizializza particelle
        function init() {
            for (let i = 0; i < 200; i++) {
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * window.innerHeight;
                particles.push(new Particle(x, y));
            }
        }

        // Loop principale
        function animate() {
            particles.forEach(particle => particle.update());
            
            // Controlla se il mouse si è fermato
            const now = Date.now();
            isMouseMoving = (now - lastMouseMove) < 1000; // Mouse fermo da più di 1 secondo
            
            // Mostra/nascondi istruzioni
            const info = document.getElementById('info');
            if (!isMouseMoving && transformationCount < 10) {
                info.style.opacity = '1';
            } else {
                info.style.opacity = '0';
            }
            
            // Aggiorna indicatore stadio
            const averageStage = particles.reduce((sum, p) => sum + p.stage, 0) / particles.length;
            const currentStageName = stages[Math.floor(averageStage)]?.name || 'Trasformazione';
            document.getElementById('stage-indicator').textContent = 
                `Stadio medio: ${currentStageName} (${averageStage.toFixed(1)}/5)`;
            
            requestAnimationFrame(animate);
        }

        // Eventi mouse
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            lastMouseMove = Date.now();
            
            // Aggiorna cursore custom
            const cursor = document.getElementById('cursor');
            cursor.style.left = (mouseX - 4) + 'px';
            cursor.style.top = (mouseY - 4) + 'px';
        });

        // Click per aggiungere nuove particelle
        document.addEventListener('click', (e) => {
            for (let i = 0; i < 5; i++) {
                const x = e.clientX + (Math.random() - 0.5) * 50;
                const y = e.clientY + (Math.random() - 0.5) * 50;
                particles.push(new Particle(x, y));
            }
        });

        // Resize
        window.addEventListener('resize', () => {
            particles.forEach(particle => {
                if (particle.x > window.innerWidth) particle.x = window.innerWidth - 10;
                if (particle.y > window.innerHeight) particle.y = window.innerHeight - 10;
            });
        });

        // Avvio
        init();
        animate();

        // Messaggio di benvenuto
        setTimeout(() => {
            if (transformationCount === 0) {
                console.log('La metamorfosi più profonda accade quando smetti di guardare...');
            }
        }, 5000);
    </script>
</body>
</html>
