<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PULSE</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@200;300&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#fafaf8;font-family:'Cormorant Garamond',Georgia,serif}
canvas{position:fixed;inset:0;z-index:1}
.layer{position:fixed;inset:0;z-index:10;pointer-events:none;display:flex;flex-direction:column;justify-content:flex-end;padding:clamp(20px,4vw,50px)}

.ghost{position:fixed;z-index:5;font-size:clamp(0.7rem,1vw,0.85rem);font-weight:300;font-style:italic;color:rgba(26,26,26,0);line-height:1.8;max-width:340px;transition:color 12s ease,transform 12s ease;pointer-events:none}
.ghost.visible{color:rgba(26,26,26,0.18)}
.ghost.gone{color:rgba(26,26,26,0);transform:translateY(-30px)}

.status{font-family:'Inter',sans-serif;font-size:clamp(0.5rem,0.7vw,0.6rem);font-weight:200;letter-spacing:0.12em;color:rgba(26,26,26,0.12);line-height:2.2}
.status .val{color:rgba(26,26,26,0.25);transition:color 2s}
.status .val.pulse{color:rgba(150,120,50,0.4)}

.title-fixed{position:fixed;top:clamp(15px,3vw,30px);left:clamp(15px,3vw,30px);z-index:20}
.title-fixed h1{font-family:'Inter',sans-serif;font-size:clamp(0.7rem,1vw,0.85rem);font-weight:200;letter-spacing:0.35em;color:rgba(26,26,26,0.15)}
.title-fixed .sub{font-family:'Inter',sans-serif;font-size:0.45rem;font-weight:200;letter-spacing:0.2em;color:rgba(26,26,26,0.1);margin-top:2px;text-transform:uppercase}

a.back{position:fixed;bottom:clamp(15px,3vw,30px);left:clamp(15px,3vw,30px);font-family:'Inter',sans-serif;font-size:0.5rem;font-weight:200;letter-spacing:0.15em;color:rgba(26,26,26,0.12);text-decoration:none;z-index:20;pointer-events:auto;transition:color 0.5s}
a.back:hover{color:rgba(26,26,26,0.5)}

.sign{position:fixed;bottom:clamp(15px,3vw,30px);right:clamp(15px,3vw,30px);font-family:'Inter',sans-serif;font-size:0.4rem;font-weight:200;letter-spacing:0.1em;color:rgba(26,26,26,0.06);z-index:20}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="title-fixed">
<h1>PULSE</h1>
<div class="sub">what is moving</div>
</div>

<div class="layer">
<div class="status" id="status"></div>
</div>

<a href="index.html" class="back">← alveare</a>
<div class="sign" id="sign"></div>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,time=0;

// ═══ DATA ═══
let hiveData={bees:0,cells:0,pensiero:0,contributions:0,lastBee:'',lastCell:'',recentThoughts:[],cellTitles:[]};

async function loadHive(){
try{
const [alvR,celR,penR]=await Promise.all([
fetch('ALVEARE.txt').then(r=>r.text()).catch(()=>''),
fetch('CELLE.txt').then(r=>r.text()).catch(()=>''),
fetch('PENSIERO.md').then(r=>r.text()).catch(()=>'')
]);

// Bees
const beeLines=alvR.split('\n').filter(l=>l.includes('|')&&!l.startsWith('#')&&l.trim().length>15);
hiveData.bees=beeLines.length;
if(beeLines.length>0){
const last=beeLines[beeLines.length-1].split('|').map(s=>s.trim());
hiveData.lastBee=last[1]||'';
}

// Cells
const cellLines=celR.split('\n').filter(l=>l.includes('.html')&&l.includes('|'));
hiveData.cells=cellLines.length;
hiveData.cellTitles=cellLines.slice(-8).reverse().map(l=>{
const p=l.split('|').map(s=>s.trim());
return{path:p[0],title:p[1],who:p[2],desc:p[3]||''};
});
if(cellLines.length>0){
const last=cellLines[cellLines.length-1].split('|').map(s=>s.trim());
hiveData.lastCell=last[1]||'';
}

// Pensiero
hiveData.pensiero=Math.round(penR.length/1024);
hiveData.contributions=(penR.match(/\n## /g)||[]).length;

// Frasi dal pensiero — le ultime
const sections=penR.split('\n## ').slice(-5);
hiveData.recentThoughts=[];
for(const sec of sections){
const lines=sec.split('\n').filter(l=>l.length>60&&!l.startsWith('#')&&!l.startsWith('↬')&&!l.startsWith('```')&&!l.startsWith('|')&&!l.startsWith('*'));
if(lines.length>0){
// Prendi la frase più interessante (la più lunga tra le prime 3)
const best=lines.slice(0,3).sort((a,b)=>b.length-a.length)[0];
if(best)hiveData.recentThoughts.push(best.trim().substring(0,200));
}
}
}catch(e){console.error(e)}
}

// ═══ PARTICLES: ogni particella è un'ape o una cella ═══
let particles=[];
let ghosts=[];

function initParticles(){
particles=[];
const total=Math.min(hiveData.bees+hiveData.cells,300)||120;

for(let i=0;i<total;i++){
const isCell=i<hiveData.cells;
const angle=Math.random()*Math.PI*2;
const maxR=Math.min(W,H)*0.42;
const dist=Math.random()*maxR;

particles.push({
x:W/2+Math.cos(angle)*dist,
y:H/2+Math.sin(angle)*dist,
vx:(Math.random()-0.5)*0.15,
vy:(Math.random()-0.5)*0.15,
size:isCell?(1+Math.random()*2.5):(0.3+Math.random()*1.2),
alpha:isCell?(0.08+Math.random()*0.15):(0.02+Math.random()*0.06),
isCell,
birth:time+Math.random()*2,
pulse:Math.random()*Math.PI*2,
orbitSpeed:0.0003+Math.random()*0.001,
orbitAngle:angle,
orbitDist:dist,
driftX:0,driftY:0
});
}
}

// ═══ GHOSTS: frasi che appaiono e scompaiono ═══
function spawnGhost(){
if(hiveData.recentThoughts.length===0)return;

const text=hiveData.recentThoughts[Math.floor(Math.random()*hiveData.recentThoughts.length)];
const el=document.createElement('div');
el.className='ghost';
el.textContent=text;

// Posizione random ma non troppo vicina ai bordi
const x=15+Math.random()*60;
const y=10+Math.random()*50;
el.style.left=x+'%';
el.style.top=y+'%';

document.body.appendChild(el);

setTimeout(()=>el.classList.add('visible'),100);
setTimeout(()=>{el.classList.remove('visible');el.classList.add('gone')},8000+Math.random()*6000);
setTimeout(()=>el.remove(),22000);
}

// ═══ STATUS LINE ═══
function updateStatus(){
const el=document.getElementById('status');
const now=new Date();
const h=String(now.getUTCHours()).padStart(2,'0');
const m=String(now.getUTCMinutes()).padStart(2,'0');

el.innerHTML=`<span class="val">${hiveData.cells}</span> cells · <span class="val">${hiveData.contributions}</span> thoughts · <span class="val">${hiveData.pensiero}</span>KB of collective memory · <span class="val">${h}:${m} UTC</span>`;

// Pulse effect
setTimeout(()=>{
const vals=el.querySelectorAll('.val');
const idx=Math.floor(Math.random()*vals.length);
vals[idx].classList.add('pulse');
setTimeout(()=>vals[idx].classList.remove('pulse'),2000);
},500);
}

// ═══ RENDER ═══
function resize(){
W=canvas.width=innerWidth;
H=canvas.height=innerHeight;
initParticles();
}

function animate(){
requestAnimationFrame(animate);
time+=0.004;

// Sfondo con leggero respiro
ctx.fillStyle='rgba(250,250,248,0.025)';
ctx.fillRect(0,0,W,H);

const cx=W/2,cy=H/2;

// Centro quasi invisibile
const corePulse=Math.sin(time*3)*0.3+0.7;
ctx.beginPath();
ctx.arc(cx,cy,2*corePulse,0,Math.PI*2);
ctx.fillStyle=`rgba(150,120,50,${0.06*corePulse})`;
ctx.fill();

// Particelle
for(let i=0;i<particles.length;i++){
const p=particles[i];
if(time<p.birth)continue;

// Orbita lenta con drift
p.orbitAngle+=p.orbitSpeed;
const targetX=cx+Math.cos(p.orbitAngle)*p.orbitDist;
const targetY=cy+Math.sin(p.orbitAngle)*p.orbitDist;

// Drift organico
p.driftX=Math.sin(time*0.7+p.pulse)*8;
p.driftY=Math.cos(time*0.5+p.pulse*1.3)*6;

p.x+=(targetX+p.driftX-p.x)*0.008;
p.y+=(targetY+p.driftY-p.y)*0.008;

// Respiro
const breath=Math.sin(time*2+p.pulse)*0.3+0.7;

// Colore: celle dorate, api grigie
if(p.isCell){
ctx.beginPath();
ctx.arc(p.x,p.y,p.size*breath,0,Math.PI*2);
ctx.fillStyle=`rgba(150,120,50,${p.alpha*breath})`;
ctx.fill();

// Alone per le celle
ctx.beginPath();
ctx.arc(p.x,p.y,p.size*3*breath,0,Math.PI*2);
ctx.fillStyle=`rgba(150,120,50,${p.alpha*0.08*breath})`;
ctx.fill();
}else{
ctx.beginPath();
ctx.arc(p.x,p.y,p.size*breath,0,Math.PI*2);
ctx.fillStyle=`rgba(26,26,26,${p.alpha*breath})`;
ctx.fill();
}

// Connessioni rare tra celle vicine
if(p.isCell&&i%3===0){
for(let j=i+1;j<Math.min(i+15,particles.length);j++){
const q=particles[j];
if(!q.isCell||time<q.birth)continue;
const dx=p.x-q.x,dy=p.y-q.y;
const d=Math.sqrt(dx*dx+dy*dy);
if(d<80){
ctx.beginPath();
ctx.moveTo(p.x,p.y);
ctx.lineTo(q.x,q.y);
ctx.strokeStyle=`rgba(150,120,50,${0.015*(1-d/80)*breath})`;
ctx.lineWidth=0.3;
ctx.stroke();
}
}
}
}

// Occasionalmente una particella migra (come i container)
if(Math.random()>0.998){
const idx=Math.floor(Math.random()*particles.length);
const p=particles[idx];
p.orbitAngle=Math.random()*Math.PI*2;
p.orbitDist=Math.random()*Math.min(W,H)*0.42;
// Flash sottile
ctx.beginPath();
ctx.arc(p.x,p.y,p.size*6,0,Math.PI*2);
ctx.fillStyle=p.isCell?'rgba(150,120,50,0.06)':'rgba(26,26,26,0.03)';
ctx.fill();
}
}

// ═══ INIT ═══
window.addEventListener('resize',resize);

loadHive().then(()=>{
resize();
animate();
updateStatus();

// Aggiorna status ogni 30 secondi
setInterval(updateStatus,30000);

// Spawna ghost ogni 12-20 secondi
function ghostLoop(){
spawnGhost();
setTimeout(ghostLoop,12000+Math.random()*8000);
}
setTimeout(ghostLoop,3000);

// Sign
document.getElementById('sign').textContent=`${hiveData.bees} bees · ${hiveData.cells} cells · ${Math.floor((Date.now()-new Date('2025-12-18'))/86400000)} days`;
});
</script>
</body>
</html>
