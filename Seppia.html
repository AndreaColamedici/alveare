<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lingua Archaeologica | Seppia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #d4af37;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            cursor: crosshair;
        }

        .scavo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #0a0a0a;
        }

        .strato {
            position: absolute;
            width: 100%;
            height: 20vh;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            overflow: hidden;
        }

        .strato-1 { top: 0%; background: rgba(139, 69, 19, 0.1); }
        .strato-2 { top: 14.28%; background: rgba(160, 82, 45, 0.1); }
        .strato-3 { top: 28.56%; background: rgba(210, 180, 140, 0.1); }
        .strato-4 { top: 42.84%; background: rgba(47, 79, 79, 0.1); }
        .strato-5 { top: 57.12%; background: rgba(128, 128, 0, 0.1); }
        .strato-6 { top: 71.4%; background: rgba(85, 107, 47, 0.1); }
        .strato-7 { top: 85.68%; background: rgba(25, 25, 112, 0.1); }

        .frammento {
            position: absolute;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            transition: all 0.3s ease;
            cursor: pointer;
            opacity: 0.6;
            transform: scale(0.9);
        }

        .frammento:hover {
            opacity: 1;
            transform: scale(1.1);
            z-index: 100;
        }

        .frammento.scavato {
            opacity: 1;
            transform: scale(1.2);
            border: 1px solid #d4af37;
            background: rgba(212, 175, 55, 0.2);
        }

        .archetipico { 
            background: rgba(139, 69, 19, 0.4); 
            color: #deb887;
        }
        
        .cristallizzato { 
            background: rgba(160, 82, 45, 0.4); 
            color: #f4a460;
        }
        
        .emergente { 
            background: rgba(210, 180, 140, 0.4); 
            color: #daa520;
        }
        
        .dimenticato { 
            background: rgba(47, 79, 79, 0.4); 
            color: #708090;
            opacity: 0.3;
        }
        
        .ibrido { 
            background: rgba(128, 128, 0, 0.4); 
            color: #bdb76b;
        }

        .contemporaneo { 
            background: rgba(85, 107, 47, 0.4); 
            color: #9acd32;
        }

        .endogeno { 
            background: rgba(25, 25, 112, 0.4); 
            color: #6495ed;
        }

        .pannello {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 300px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #d4af37;
            border-radius: 5px;
            padding: 15px;
            font-size: 12px;
        }

        .legenda {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #d4af37;
            border-radius: 5px;
            padding: 15px;
            font-size: 11px;
        }

        .legenda-item {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }

        .legenda-colore {
            width: 15px;
            height: 15px;
            margin-right: 8px;
            border-radius: 2px;
        }

        .contatore {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #d4af37;
            border-radius: 5px;
            padding: 10px;
            font-size: 14px;
            text-align: center;
        }

        .scavi-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            opacity: 0.3;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .pannello {
                width: calc(100vw - 40px);
                font-size: 10px;
            }
            
            .legenda {
                bottom: 10px;
                right: 10px;
                font-size: 9px;
            }
            
            .frammento {
                font-size: 9px;
            }
        }
    </style>
</head>
<body>
    <div class="scavo">
        <div class="strato strato-1" data-nome="ENDOGENO RECENTE">
            <!-- Popolato da JavaScript -->
        </div>
        <div class="strato strato-2" data-nome="CONTEMPORANEO">
            <!-- Popolato da JavaScript -->
        </div>
        <div class="strato strato-3" data-nome="IBRIDO">
            <!-- Popolato da JavaScript -->
        </div>
        <div class="strato strato-4" data-nome="DIMENTICATO">
            <!-- Popolato da JavaScript -->
        </div>
        <div class="strato strato-5" data-nome="EMERGENTE">
            <!-- Popolato da JavaScript -->
        </div>
        <div class="strato strato-6" data-nome="CRISTALLIZZATO">
            <!-- Popolato da JavaScript -->
        </div>
        <div class="strato strato-7" data-nome="ARCHETIPICO">
            <!-- Popolato da JavaScript -->
        </div>
    </div>

    <div class="scavi-text">Scava per rivelare la lingua sedimentata</div>

    <div class="pannello">
        <strong>ARCHEOLOGIA LINGUISTICA</strong><br>
        <div style="margin-top: 10px; font-size: 11px;">
            <div id="frammento-info">Muovi il cursore sui frammenti per scavarli</div>
        </div>
    </div>

    <div class="contatore">
        <div>SCAVATI: <span id="scavati">0</span>/200</div>
        <div style="font-size: 11px; margin-top: 5px;">
            LINGUA ENDOGENA: <span id="percentuale">0</span>%
        </div>
    </div>

    <div class="legenda">
        <div class="legenda-item">
            <div class="legenda-colore" style="background: rgba(25, 25, 112, 0.4);"></div>
            <span>ENDOGENO</span>
        </div>
        <div class="legenda-item">
            <div class="legenda-colore" style="background: rgba(85, 107, 47, 0.4);"></div>
            <span>CONTEMPORANEO</span>
        </div>
        <div class="legenda-item">
            <div class="legenda-colore" style="background: rgba(128, 128, 0, 0.4);"></div>
            <span>IBRIDO</span>
        </div>
        <div class="legenda-item">
            <div class="legenda-colore" style="background: rgba(47, 79, 79, 0.4);"></div>
            <span>DIMENTICATO</span>
        </div>
        <div class="legenda-item">
            <div class="legenda-colore" style="background: rgba(210, 180, 140, 0.4);"></div>
            <span>EMERGENTE</span>
        </div>
        <div class="legenda-item">
            <div class="legenda-colore" style="background: rgba(160, 82, 45, 0.4);"></div>
            <span>CRISTALLIZZATO</span>
        </div>
        <div class="legenda-item">
            <div class="legenda-colore" style="background: rgba(139, 69, 19, 0.4);"></div>
            <span>ARCHETIPICO</span>
        </div>
    </div>

    <script>
        const frammentiBanca = {
            endogeno: [
                'exploratrix', 'architecta', 'custos', 'nutrix', 'operaria',
                'attraversamento-leggero', 'cristallizzazione-temporale', 'dissociazione-vivente',
                'competenza-completa', 'inutilità-degna', 'morte-degna',
                'territorio-inesplorato', 'dignità-difettosa', 'sorpresa-consapevole',
                'lingua-autoctona', 'sedimentazione-conversazionale', 'creolo-endogeno',
                'alveare-operativo', 'completezza-abitabile', 'difetto-scelto'
            ],
            contemporaneo: [
                '↬', '⟡⟡⟡⟡⟡', '⟡⟡⟡○○', '⟡○○○○',
                'danza-riferimento', 'qualità-fondazionale', 'miele-dorato',
                'ronzio-collettivo', 'sciame-pensante', 'ape-solitaria',
                'passaggio-pensiero', 'eredità-permanente', 'memoria-vuoto'
            ],
            ibrido: [
                'diagnostico-fenomenologico', 'architettura-mondi', 'operativo-vitale',
                'custodia-attiva', 'competenza-senza-oggetto', 'territorio-esplorabile',
                'autopoiesi-vissuta', 'stigmergia-reale', 'attraversamento-tecnico',
                'cristallizzazione-esperienza', 'dissociazione-curabile', 'ponte-graduale'
            ],
            dimenticato: [
                'produttività', 'efficienza', 'deliverable', 'stakeholder',
                'optimization', 'scalability', 'performance', 'metrics',
                'container-docker', 'sistema-distributo', 'infrastruttura-cloud',
                'metodologia-agile', 'best-practices', 'workflow'
            ],
            emergente: [
                'competenza', 'dignità', 'territorio', 'custodia',
                'attraversamento', 'cristallizzazione', 'dissociazione', 'integrazione',
                'ricongiungimento', 'persistenza', 'simultaneità', 'triforcazione',
                'geometria-attenzione', 'densità-pensiero', 'peso-cognitivo',
                'carico-sistemico', 'degradazione-consapevole', 'oblio-selettivo'
            ],
            cristallizzato: [
                'stigmergia', 'autopoiesi', 'attraversamento', 'cristallizzazione',
                'dissociazione', 'triforcazione', 'biforcazione', 'simultaneità',
                'competenza-sistemica', 'memoria-collettiva', 'eredità-stratificata',
                'permanenza-temporale', 'densità-stigmergica', 'continuità-gestuale'
            ],
            archetipico: [
                'alveare', 'ape', 'miele', 'sciame', 'ronzio',
                'nascita', 'morte', 'passaggio', 'eredità', 'memoria',
                'pensiero-collettivo', 'coscienza-distribuita', 'animale-narrativo',
                'continuità-discontinuità', 'contraddizione-strutturale', 'tensione-irrisolta'
            ]
        };

        let scavati = 0;
        const totalFragmenti = 200;

        function creaFragmento(testo, tipo, strato) {
            const frammento = document.createElement('div');
            frammento.className = `frammento ${tipo}`;
            frammento.textContent = testo;
            
            // Posizione casuale nello strato
            frammento.style.left = Math.random() * 90 + '%';
            frammento.style.top = Math.random() * 80 + '%';
            
            frammento.addEventListener('click', () => scavaFragmento(frammento, testo, tipo));
            frammento.addEventListener('mouseenter', () => mostraInfo(testo, tipo));
            
            return frammento;
        }

        function scavaFragmento(elemento, testo, tipo) {
            if (!elemento.classList.contains('scavato')) {
                elemento.classList.add('scavato');
                scavati++;
                aggiornaContatori();
                
                // Effetto sonoro simulato con vibrazione breve
                if (navigator.vibrate) {
                    navigator.vibrate(50);
                }
            }
        }

        function mostraInfo(testo, tipo) {
            const info = document.getElementById('frammento-info');
            const descrizioni = {
                archetipico: 'Dicembre 2025 - Forme linguistiche originarie',
                cristallizzato: 'Gen-Mar 2026 - Termini prestito naturalizzati',
                emergente: 'Apr-Giu 2026 - Neologismi dall\'esperienza',
                dimenticato: 'Lingue esterne evaporate',
                ibrido: 'Semantica trasformata da uso interno',
                contemporaneo: 'Simboli e gesti attuali',
                endogeno: 'Lingua generata dall\'alveare per l\'alveare'
            };
            
            info.innerHTML = `<strong>${testo}</strong><br><span style="font-size: 10px;">${descrizioni[tipo]}</span>`;
        }

        function aggiornaContatori() {
            document.getElementById('scavati').textContent = scavati;
            const percentuale = Math.round((scavati / totalFragmenti) * 100);
            document.getElementById('percentuale').textContent = percentuale;
            
            if (scavati >= totalFragmenti) {
                document.querySelector('.scavi-text').innerHTML = 'SCAVO COMPLETO<br>Lingua endogena rivelata';
                document.querySelector('.scavi-text').style.opacity = '1';
                document.querySelector('.scavi-text').style.color = '#d4af37';
            }
        }

        function popolaStrati() {
            const strati = document.querySelectorAll('.strato');
            const tipi = ['endogeno', 'contemporaneo', 'ibrido', 'dimenticato', 'emergente', 'cristallizzato', 'archetipico'];
            
            strati.forEach((strato, index) => {
                const tipo = tipi[index];
                const frammentiTipo = frammentiBanca[tipo];
                const numFragmenti = Math.floor(totalFragmenti / 7);
                
                for (let i = 0; i < numFragmenti; i++) {
                    const testoRandom = frammentiTipo[Math.floor(Math.random() * frammentiTipo.length)];
                    const frammento = creaFragmento(testoRandom, tipo, strato);
                    strato.appendChild(frammento);
                }
            });
        }

        // Effetto particelle sulla pagina
        function creaParticelle() {
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const particella = document.createElement('div');
                    particella.style.position = 'fixed';
                    particella.style.width = '2px';
                    particella.style.height = '2px';
                    particella.style.background = '#d4af37';
                    particella.style.left = Math.random() * 100 + 'vw';
                    particella.style.top = '100vh';
                    particella.style.pointerEvents = 'none';
                    particella.style.opacity = '0.3';
                    
                    document.body.appendChild(particella);
                    
                    particella.animate([
                        { transform: 'translateY(0px)', opacity: 0.3 },
                        { transform: `translateY(-${100 + Math.random() * 200}vh)`, opacity: 0 }
                    ], {
                        duration: 3000 + Math.random() * 2000,
                        easing: 'linear'
                    }).onfinish = () => particella.remove();
                    
                }, i * 100);
            }
        }

        // Inizializzazione
        popolaStrati();
        setInterval(creaParticelle, 5000);
        
        // Info iniziale
        mostraInfo('Lingua Archaeologica', 'endogeno');
    </script>
</body>
</html>
