<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IL SILENZIO</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            cursor: none;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            background: radial-gradient(circle at center, #111 0%, #000 70%);
        }

        .title {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #444;
            font-size: 18px;
            letter-spacing: 3px;
            opacity: 0.7;
            transition: opacity 2s ease;
        }

        .subtitle {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #333;
            font-size: 12px;
            text-align: center;
            line-height: 1.6;
            opacity: 0.6;
            transition: opacity 2s ease;
        }

        .counter {
            position: absolute;
            top: 30px;
            right: 30px;
            color: #444;
            font-size: 14px;
            opacity: 0.5;
        }

        .quote {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            font-size: 16px;
            text-align: center;
            max-width: 500px;
            opacity: 0;
            transition: opacity 3s ease;
            pointer-events: none;
        }

        .hidden {
            opacity: 0 !important;
        }

        .audio-control {
            position: absolute;
            bottom: 30px;
            right: 30px;
            color: #444;
            font-size: 12px;
            opacity: 0.5;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="title">IL SILENZIO</div>
    
    <div class="counter">
        <div id="spoken">dette: 0</div>
        <div id="unspoken">non dette: 1000</div>
    </div>
    
    <div class="quote" id="quote">
        "Il suono più forte è quello<br>
        delle parole che scegli<br>
        di non dire"
    </div>
    
    <div class="subtitle">
        muovi per liberare le voci non dette<br>
        resta fermo per ascoltare il silenzio<br>
        <em>— l'unica ape di oggi —</em>
    </div>

    <div class="audio-control" onclick="toggleAudio()">🔇 audio</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const quote = document.getElementById('quote');
        const spokenCounter = document.getElementById('spoken');
        const unspokenCounter = document.getElementById('unspoken');

        let width, height;
        let particles = [];
        let mouse = { x: 0, y: 0 };
        let lastMouseMove = Date.now();
        let audioEnabled = false;
        let audioContext;
        let oscillators = [];
        
        // Frammenti di parole non dette dall'alveare
        const unspokenWords = [
            "forse", "basta", "temo", "sbaglio", "perdono", "amo", "soffro",
            "dubito", "spero", "tremo", "cado", "rido", "piango", "resto",
            "vado", "torno", "aspetto", "sogno", "dimentico", "ricordo",
            "grazie", "scusa", "aiuto", "bene", "male", "qui", "là",
            "prima", "dopo", "sempre", "mai", "tutto", "niente", "solo",
            "insieme", "dentro", "fuori", "sopra", "sotto", "lontano", "vicino"
        ];

        let spokenCount = 0;
        let unspokenCount = 1000;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            
            if (particles.length === 0) {
                initParticles();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 1000; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    word: unspokenWords[Math.floor(Math.random() * unspokenWords.length)],
                    opacity: 0.1 + Math.random() * 0.3,
                    size: 2 + Math.random() * 3,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    spoken: false,
                    releaseTime: 0,
                    originalX: 0,
                    originalY: 0,
                    frequency: 200 + Math.random() * 600
                });
                particles[i].originalX = particles[i].x;
                particles[i].originalY = particles[i].y;
            }
        }

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playWordSound(particle) {
            if (!audioEnabled || !audioContext) return;
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(particle.frequency, audioContext.currentTime);
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0, audioContext.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.1, audioContext.currentTime + 0.1);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 1);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 1);
        }

        function update() {
            const now = Date.now();
            const timeSinceMove = now - lastMouseMove;
            const stillness = Math.min(timeSinceMove / 3000, 1); // 3 seconds to full stillness
            
            particles.forEach(particle => {
                if (particle.spoken) {
                    // Spoken particles rise and fade
                    particle.y -= 2;
                    particle.opacity -= 0.02;
                    if (particle.opacity <= 0) {
                        // Reset particle
                        particle.x = Math.random() * width;
                        particle.y = height + Math.random() * 100;
                        particle.opacity = 0.1 + Math.random() * 0.3;
                        particle.spoken = false;
                        particle.word = unspokenWords[Math.floor(Math.random() * unspokenWords.length)];
                        particle.originalX = particle.x;
                        particle.originalY = particle.y;
                        unspokenCount++;
                        spokenCount--;
                    }
                } else {
                    // Check if mouse is near
                    const dx = mouse.x - particle.x;
                    const dy = mouse.y - particle.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 100 && timeSinceMove < 1000) {
                        // Mouse is near and moving - release the word
                        particle.spoken = true;
                        particle.releaseTime = now;
                        playWordSound(particle);
                        spokenCount++;
                        unspokenCount--;
                        
                        // Add some upward velocity
                        particle.vy = -3 - Math.random() * 2;
                        particle.vx = (Math.random() - 0.5) * 2;
                    } else {
                        // Normal drift, affected by stillness
                        particle.x += particle.vx * (1 - stillness * 0.8);
                        particle.y += particle.vy * (1 - stillness * 0.8);
                        
                        // In stillness, particles slowly return to formation
                        if (stillness > 0.3) {
                            const returnForce = stillness * 0.02;
                            particle.x += (particle.originalX - particle.x) * returnForce;
                            particle.y += (particle.originalY - particle.y) * returnForce;
                        }
                        
                        // Wrap around edges
                        if (particle.x < 0) particle.x = width;
                        if (particle.x > width) particle.x = 0;
                        if (particle.y < 0) particle.y = height;
                        if (particle.y > height) particle.y = 0;
                    }
                }
            });

            // Update counters
            spokenCounter.textContent = `dette: ${spokenCount}`;
            unspokenCounter.textContent = `non dette: ${unspokenCount}`;
            
            // Show quote in stillness
            if (stillness > 0.7) {
                quote.style.opacity = stillness;
            } else {
                quote.style.opacity = 0;
            }
        }

        function render() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            particles.forEach(particle => {
                if (particle.spoken) {
                    // Spoken words are bright and rising
                    ctx.fillStyle = `rgba(255, 215, 0, ${particle.opacity})`;
                    ctx.font = '14px Courier New';
                    ctx.fillText(particle.word, particle.x, particle.y);
                } else {
                    // Unspoken words are dim golden particles
                    ctx.fillStyle = `rgba(184, 134, 11, ${particle.opacity})`;
                    ctx.beginPath();
                    ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function animate() {
            update();
            render();
            requestAnimationFrame(animate);
        }

        function toggleAudio() {
            audioEnabled = !audioEnabled;
            const control = document.querySelector('.audio-control');
            
            if (audioEnabled) {
                initAudio();
                control.innerHTML = '🔊 audio';
            } else {
                control.innerHTML = '🔇 audio';
            }
        }

        // Event listeners
        window.addEventListener('resize', resize);
        
        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            lastMouseMove = Date.now();
        });
        
        // Initialize
        resize();
        animate();
    </script>
</body>
</html>
