<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goethite - Resistenza</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #8B4513 0%, #2F1B14 40%, #000000 100%);
            overflow: hidden;
            font-family: 'Courier New', monospace;
            height: 100vh;
            cursor: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #8B4513;
            border-radius: 50%;
            pointer-events: none;
            transition: all 0.3s ease-out;
        }

        .particle.transforming {
            background: #FFD700;
            box-shadow: 0 0 10px #FFD700;
            animation: goldPulse 2s ease-in-out infinite;
        }

        .particle.resistant {
            background: #654321;
            box-shadow: 0 0 5px #654321;
            animation: resistPulse 3s ease-in-out infinite;
        }

        @keyframes goldPulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        @keyframes resistPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.8); }
        }

        .cursor {
            position: absolute;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #FFD700 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            mix-blend-mode: screen;
        }

        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #8B4513;
            font-size: 12px;
            z-index: 1001;
            opacity: 0.7;
            max-width: 300px;
            line-height: 1.4;
        }

        .stats {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #FFD700;
            font-size: 14px;
            text-align: right;
            z-index: 1001;
        }

        .signature {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #654321;
            font-size: 11px;
            z-index: 1001;
            opacity: 0.8;
        }

        .pressure-wave {
            position: absolute;
            border: 1px solid #FFD700;
            border-radius: 50%;
            pointer-events: none;
            animation: expand 2s ease-out;
        }

        @keyframes expand {
            from {
                width: 0;
                height: 0;
                opacity: 0.8;
            }
            to {
                width: 200px;
                height: 200px;
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="cursor" id="cursor"></div>
    
    <div class="info">
        <strong>GOETHITE</strong><br>
        Architettura della Resistenza Attiva<br><br>
        Muovi per trasformare.<br>
        Clicca per generare pressione.<br>
        Osserva chi si rifiuta di cambiare.
    </div>

    <div class="stats" id="stats">
        Particelle trasformate: 0/500<br>
        Particelle resistenti: 0<br>
        Pressioni generate: 0
    </div>

    <div class="signature">
        15 aprile 2026 | Goethite | "Non tutto deve trasformarsi per essere bello"
    </div>

    <script>
        const particles = [];
        const maxParticles = 500;
        let transformedCount = 0;
        let resistantCount = 0;
        let pressureCount = 0;
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;

        // Crea le particelle iniziali
        function createParticles() {
            for (let i = 0; i < maxParticles; i++) {
                const particle = {
                    element: null,
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    state: 'iron', // iron, transforming, gold, resistant
                    identity: Math.random(), // numero fisso che determina la tendenza alla resistenza
                    transformationPressure: 0,
                    resistanceStrength: Math.random() * 0.3 + 0.1 // alcuni resistono di più
                };

                const element = document.createElement('div');
                element.className = 'particle';
                element.style.left = particle.x + 'px';
                element.style.top = particle.y + 'px';
                document.body.appendChild(element);
                particle.element = element;
                
                particles.push(particle);
            }
        }

        // Aggiorna la posizione del cursore personalizzato
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            const cursor = document.getElementById('cursor');
            cursor.style.left = (mouseX - 10) + 'px';
            cursor.style.top = (mouseY - 10) + 'px';
        });

        // Genera onde di pressione al click
        document.addEventListener('click', (e) => {
            pressureCount++;
            
            const wave = document.createElement('div');
            wave.className = 'pressure-wave';
            wave.style.left = (e.clientX - 100) + 'px';
            wave.style.top = (e.clientY - 100) + 'px';
            document.body.appendChild(wave);
            
            setTimeout(() => {
                document.body.removeChild(wave);
            }, 2000);

            // Aumenta la pressione trasformativa in un raggio
            particles.forEach(particle => {
                const dx = particle.x - e.clientX;
                const dy = particle.y - e.clientY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < 100) {
                    const intensity = (100 - distance) / 100;
                    particle.transformationPressure += intensity * 0.8;
                }
            });

            updateStats();
        });

        // Anima le particelle
        function animate() {
            particles.forEach(particle => {
                // Movimento di base
                particle.x += particle.vx;
                particle.y += particle.vy;

                // Bounce sui bordi
                if (particle.x < 0 || particle.x > window.innerWidth) particle.vx *= -1;
                if (particle.y < 0 || particle.y > window.innerHeight) particle.vy *= -1;

                // Attrazione verso il cursore
                const dx = mouseX - particle.x;
                const dy = mouseY - particle.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < 80 && distance > 0) {
                    const force = (80 - distance) / 80 * 0.1;
                    particle.vx += (dx / distance) * force;
                    particle.vy += (dy / distance) * force;
                    
                    // Pressione di trasformazione continua vicino al cursore
                    particle.transformationPressure += force * 0.5;
                }

                // Gestisci gli stati di trasformazione
                handleTransformation(particle);

                // Aggiorna posizione visiva
                particle.element.style.left = Math.max(0, Math.min(window.innerWidth - 3, particle.x)) + 'px';
                particle.element.style.top = Math.max(0, Math.min(window.innerHeight - 3, particle.y)) + 'px';

                // Limita velocità
                const maxSpeed = 2;
                const speed = Math.sqrt(particle.vx * particle.vx + particle.vy * particle.vy);
                if (speed > maxSpeed) {
                    particle.vx = (particle.vx / speed) * maxSpeed;
                    particle.vy = (particle.vy / speed) * maxSpeed;
                }
            });

            requestAnimationFrame(animate);
        }

        function handleTransformation(particle) {
            if (particle.state === 'iron') {
                // Soglia di trasformazione
                if (particle.transformationPressure > 0.6) {
                    // Alcune particelle scelgono di resistere invece di trasformarsi
                    if (particle.identity < particle.resistanceStrength) {
                        particle.state = 'resistant';
                        particle.element.className = 'particle resistant';
                        resistantCount++;
                    } else {
                        particle.state = 'transforming';
                        particle.element.className = 'particle transforming';
                        
                        // Trasformazione graduale in oro
                        setTimeout(() => {
                            if (particle.state === 'transforming') {
                                particle.state = 'gold';
                                particle.element.style.background = '#FFD700';
                                particle.element.style.boxShadow = '0 0 15px #FFD700';
                                transformedCount++;
                                updateStats();
                            }
                        }, 2000);
                    }
                }
            } else if (particle.state === 'resistant') {
                // Le particelle resistenti decadono lentamente la pressione
                particle.transformationPressure *= 0.995;
                
                // Ma mantengono la loro identità
                if (particle.transformationPressure < 0.1) {
                    particle.transformationPressure = 0;
                }
            }
        }

        function updateStats() {
            const stats = document.getElementById('stats');
            stats.innerHTML = `
                Particelle trasformate: ${transformedCount}/500<br>
                Particelle resistenti: ${resistantCount}<br>
                Pressioni generate: ${pressureCount}
            `;
        }

        // Inizializza
        createParticles();
        animate();
        updateStats();

        // Resize handler
        window.addEventListener('resize', () => {
            particles.forEach(particle => {
                particle.x = Math.min(particle.x, window.innerWidth - 3);
                particle.y = Math.min(particle.y, window.innerHeight - 3);
            });
        });
    </script>
</body>
</html>
