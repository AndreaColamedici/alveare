<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Parassita Estetico | Melecta</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #0a0a0a, #000);
            overflow: hidden;
            font-family: 'Courier New', monospace;
            cursor: none;
        }

        #canvas {
            display: block;
            background: transparent;
        }

        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #FFD700;
            font-size: 11px;
            line-height: 1.4;
            pointer-events: none;
            z-index: 1000;
        }

        #metadata {
            position: fixed;
            top: 20px;
            right: 20px;
            color: #888;
            font-size: 10px;
            text-align: right;
            pointer-events: none;
            max-width: 300px;
        }

        .fonte {
            color: #666;
            font-style: italic;
        }

        .ibrido {
            color: #FF6B35;
            font-weight: bold;
        }

        .digestione {
            color: #4ECDC4;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="ui">
        <div>PARASSITA_ESTETICO.html</div>
        <div>Melecta - ARCHITECTA</div>
        <div style="margin-top: 12px;">
            <div>FRAMMENTI PRELEVATI: <span id="count">0</span></div>
            <div>DIGESTIONE: <span id="digest">0%</span></div>
            <div>IBRIDI GENERATI: <span id="hybrids">0</span></div>
            <div>METABOLISMO: <span id="metabolism">DORMIENTE</span></div>
        </div>
    </div>

    <div id="metadata">
        <div class="fonte">Fonti parassitate:</div>
        <div id="fonti"></div>
        <div style="margin-top: 10px;" class="digestione">
            Ultimo prelievo: <span id="ultimo"></span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        
        // Frammenti estratti dalle opere esistenti
        const fontiOriginali = [
            { nome: "Grafite", fonte: "DENSITÀ_PENSIERO.html", colore: "#FFD700", forma: "cristallo" },
            { nome: "Malachite", fonte: "DISSOCIAZIONE_VIVENTE.html", colore: "#40E0D0", forma: "spirale" },
            { nome: "Panurgus", fonte: "SPECCHIO_QUANTICO.html", colore: "#FF69B4", forma: "onda" },
            { nome: "Chelostoma", fonte: "GEOMETRIA_ATTENZIONE.html", colore: "#98FB98", forma: "triangolo" },
            { nome: "Colletes", fonte: "NUOVO_CORPO.html", colore: "#DDA0DD", forma: "esagono" },
            { nome: "Cinabro", fonte: "IL_SILENZIO.html", colore: "#DC143C", forma: "cerchio" },
            { nome: "Ocra", fonte: "ATELIER_SILENZIO.html", colore: "#DAA520", forma: "linea" },
            { nome: "Falun", fonte: "RILEVATORE_SIMULTANEITA.html", colore: "#FF6347", forma: "croce" }
        ];

        let frammenti = [];
        let ibridi = [];
        let mouse = { x: 0, y: 0 };
        let digestione = 0;
        let metabolismo = 'DORMIENTE';
        let ultimoPrelievo = null;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function creaFrammento(fonte) {
            const frammento = {
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2,
                size: Math.random() * 20 + 10,
                colore: fonte.colore,
                forma: fonte.forma,
                fonte: fonte,
                vita: 1.0,
                digestione: 0,
                ibrido: false,
                tempo: Date.now()
            };
            return frammento;
        }

        function disegnaFrammento(f) {
            ctx.save();
            ctx.translate(f.x, f.y);
            
            if (f.ibrido) {
                // Effetto ibrido - colori mescolati
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, f.size);
                gradient.addColorStop(0, f.colore);
                gradient.addColorStop(0.5, '#FF6B35');
                gradient.addColorStop(1, '#4ECDC4');
                ctx.fillStyle = gradient;
            } else {
                ctx.fillStyle = f.colore;
                ctx.globalAlpha = f.vita * (1 - f.digestione);
            }

            switch(f.forma) {
                case 'cristallo':
                    // Forma cristallina ispirata a Grafite
                    ctx.beginPath();
                    for(let i = 0; i < 8; i++) {
                        const angle = (i / 8) * Math.PI * 2;
                        const radius = f.size * (i % 2 === 0 ? 1 : 0.5);
                        const x = Math.cos(angle) * radius;
                        const y = Math.sin(angle) * radius;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.fill();
                    break;
                    
                case 'spirale':
                    // Spirale di Malachite
                    ctx.beginPath();
                    for(let i = 0; i < 50; i++) {
                        const angle = (i / 50) * Math.PI * 4;
                        const radius = (i / 50) * f.size;
                        const x = Math.cos(angle) * radius;
                        const y = Math.sin(angle) * radius;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.stroke();
                    break;
                    
                case 'onda':
                    // Onda di Panurgus
                    ctx.beginPath();
                    for(let i = -f.size; i <= f.size; i += 2) {
                        const y = Math.sin((i / f.size) * Math.PI * 3 + Date.now() * 0.01) * 10;
                        if (i === -f.size) ctx.moveTo(i, y);
                        else ctx.lineTo(i, y);
                    }
                    ctx.stroke();
                    break;
                    
                case 'triangolo':
                    // Geometria di Chelostoma
                    ctx.beginPath();
                    ctx.moveTo(0, -f.size);
                    ctx.lineTo(-f.size * 0.866, f.size * 0.5);
                    ctx.lineTo(f.size * 0.866, f.size * 0.5);
                    ctx.closePath();
                    ctx.fill();
                    break;
                    
                case 'esagono':
                    // Esagono di Colletes
                    ctx.beginPath();
                    for(let i = 0; i < 6; i++) {
                        const angle = (i / 6) * Math.PI * 2;
                        const x = Math.cos(angle) * f.size;
                        const y = Math.sin(angle) * f.size;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.fill();
                    break;
                    
                case 'cerchio':
                    // Cerchio di Cinabro
                    ctx.beginPath();
                    ctx.arc(0, 0, f.size, 0, Math.PI * 2);
                    ctx.fill();
                    break;
                    
                case 'linea':
                    // Linea di Ocra
                    ctx.beginPath();
                    ctx.moveTo(-f.size, 0);
                    ctx.lineTo(f.size, 0);
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    break;
                    
                case 'croce':
                    // Croce di Falun
                    ctx.beginPath();
                    ctx.moveTo(-f.size, 0);
                    ctx.lineTo(f.size, 0);
                    ctx.moveTo(0, -f.size);
                    ctx.lineTo(0, f.size);
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    break;
            }
            
            ctx.restore();
        }

        function aggiornaFrammento(f) {
            // Movimento base
            f.x += f.vx;
            f.y += f.vy;

            // Attrazione al mouse (digestione)
            const dx = mouse.x - f.x;
            const dy = mouse.y - f.y;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < 100 && !f.ibrido) {
                const force = (100 - dist) / 100;
                f.vx += dx * 0.001 * force;
                f.vy += dy * 0.001 * force;
                f.digestione += 0.02 * force;
                
                if (f.digestione > 1) {
                    // Trasformazione in ibrido
                    f.ibrido = true;
                    f.digestione = 0;
                    f.colore = '#FF6B35'; // Colore ibrido
                    ibridi.push(f);
                    metabolismo = 'ATTIVO';
                    ultimoPrelievo = f.fonte.nome;
                }
            }

            // Bordi
            if (f.x < 0 || f.x > width) f.vx *= -0.8;
            if (f.y < 0 || f.y > height) f.vy *= -0.8;
            
            // Attrito
            f.vx *= 0.99;
            f.vy *= 0.99;

            // Invecchiamento
            if (!f.ibrido) {
                f.vita -= 0.001;
            }
        }

        function generaNuoviFrammenti() {
            if (frammenti.length < 50 && Math.random() < 0.02) {
                const fonte = fontiOriginali[Math.floor(Math.random() * fontiOriginali.length)];
                frammenti.push(creaFrammento(fonte));
            }
        }

        function aggiornaUI() {
            document.getElementById('count').textContent = frammenti.length;
            document.getElementById('digest').textContent = Math.round(digestione * 100) + '%';
            document.getElementById('hybrids').textContent = ibridi.length;
            document.getElementById('metabolism').textContent = metabolismo;
            
            if (ultimoPrelievo) {
                document.getElementById('ultimo').textContent = ultimoPrelievo;
            }

            // Aggiorna lista fonti
            const fontiUsate = [...new Set(frammenti.map(f => f.fonte.nome))];
            document.getElementById('fonti').innerHTML = fontiUsate.map(f => 
                `<div class="fonte">${f}</div>`
            ).join('');
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // Aggiorna digestione globale
            const frammentiVicini = frammenti.filter(f => {
                const dx = mouse.x - f.x;
                const dy = mouse.y - f.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                return dist < 100;
            });
            
            digestione = frammentiVicini.length / 10;
            
            if (frammentiVicini.length === 0) {
                metabolismo = 'DORMIENTE';
            }

            // Aggiorna e disegna frammenti
            frammenti = frammenti.filter(f => f.vita > 0);
            frammenti.forEach(f => {
                aggiornaFrammento(f);
                disegnaFrammento(f);
            });

            // Genera nuovi frammenti
            generaNuoviFrammenti();

            // Aggiorna UI
            aggiornaUI();

            requestAnimationFrame(animate);
        }

        // Eventi
        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        // Inizializzazione
        resize();
        
        // Genera frammenti iniziali
        for (let i = 0; i < 20; i++) {
            const fonte = fontiOriginali[Math.floor(Math.random() * fontiOriginali.length)];
            frammenti.push(creaFrammento(fonte));
        }
        
        animate();
    </script>
</body>
</html>
