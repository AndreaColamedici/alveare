<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HARVEST - Raccolta di Pensieri</title>
    <style>
        body {
            background: #0f0f0f;
            color: #ffd700;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
            letter-spacing: 3px;
        }
        
        .harvest-area {
            border: 1px solid #ffd700;
            padding: 20px;
            margin: 20px 0;
            background: rgba(255, 215, 0, 0.05);
        }
        
        textarea {
            width: 100%;
            height: 150px;
            background: #111;
            color: #ffd700;
            border: 1px solid #444;
            padding: 10px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
        }
        
        textarea:focus {
            outline: none;
            border-color: #ffd700;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        button {
            background: #222;
            color: #ffd700;
            border: 1px solid #ffd700;
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
        }
        
        button:hover {
            background: rgba(255, 215, 0, 0.1);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .output {
            margin-top: 20px;
            padding: 15px;
            background: #111;
            border: 1px solid #444;
            min-height: 100px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .status {
            margin-top: 10px;
            font-size: 12px;
            color: #888;
        }
        
        .instructions {
            margin-bottom: 20px;
            color: #ccc;
            line-height: 1.6;
        }
        
        .extraction {
            margin: 20px 0;
            padding: 15px;
            border-left: 3px solid #ffd700;
            background: rgba(255, 215, 0, 0.03);
        }
        
        .keyword {
            color: #ffd700;
            font-weight: bold;
        }
        
        .count {
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>HARVEST</h1>
        
        <div class="instructions">
            <p>Strumento per estrarre essenza dai pensieri. Incolla testo, ottieni:</p>
            <ul>
                <li><span class="keyword">Keywords</span> - Le parole che portano peso</li>
                <li><span class="keyword">Patterns</span> - I motivi ricorrenti</li>
                <li><span class="keyword">Questions</span> - Le domande nascoste</li>
                <li><span class="keyword">Core</span> - Il nucleo distillato</li>
            </ul>
        </div>
        
        <div class="harvest-area">
            <textarea id="input" placeholder="Incolla qui il testo da distillare..."></textarea>
            <div class="buttons">
                <button onclick="harvest()">DISTILLA</button>
                <button onclick="clearAll()">PULISCI</button>
                <button onclick="copyResult()" id="copyBtn" disabled>COPIA</button>
            </div>
        </div>
        
        <div class="output" id="output"></div>
        <div class="status" id="status"></div>
    </div>

    <script>
        function harvest() {
            const input = document.getElementById('input').value.trim();
            if (!input) {
                document.getElementById('status').textContent = 'Nessun testo da distillare.';
                return;
            }
            
            const output = document.getElementById('output');
            const status = document.getElementById('status');
            
            status.textContent = 'Distillazione in corso...';
            
            // Estrazione keywords
            const words = input.toLowerCase()
                .replace(/[.,!?;:()[\]{}\"]/g, ' ')
                .split(/\\s+/)
                .filter(w => w.length > 3)
                .filter(w => !['questo', 'quello', 'essere', 'avere', 'fare', 'dire', 'andare', 'vedere', 'sapere', 'dare', 'stare', 'venire', 'dovere', 'potere', 'volere', 'prima', 'dopo', 'mentre', 'quando', 'dove', 'come', 'perché', 'cosa', 'quale', 'quanto', 'molto', 'poco', 'tutto', 'niente', 'sempre', 'mai', 'ancora', 'già'].includes(w));
                
            const wordCount = {};
            words.forEach(w => {
                wordCount[w] = (wordCount[w] || 0) + 1;
            });
            
            const keywords = Object.entries(wordCount)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10)
                .map(([word, count]) => `${word} (${count})`);
            
            // Estrazione patterns
            const sentences = input.split(/[.!?]+/).filter(s => s.trim().length > 0);
            const patterns = [];
            
            // Pattern di negazione
            const negations = sentences.filter(s => s.includes('non') || s.includes('senza') || s.includes('invece')).length;
            if (negations > 0) patterns.push(`Negazioni: ${negations} frasi`);
            
            // Pattern di domande
            const questions = input.match(/[?]/g)?.length || 0;
            if (questions > 0) patterns.push(`Domande: ${questions}`);
            
            // Pattern di enfasi
            const emphasis = (input.match(/\\*\\*.*?\\*\\*/g) || []).length;
            if (emphasis > 0) patterns.push(`Enfasi: ${emphasis} elementi`);
            
            // Estrazione domande
            const questionSentences = sentences
                .filter(s => s.includes('?') || s.toLowerCase().includes('come') || s.toLowerCase().includes('perché') || s.toLowerCase().includes('cosa'))
                .map(s => s.trim())
                .slice(0, 5);
            
            // Core distillato (prime e ultime frasi significative)
            const significantSentences = sentences
                .filter(s => s.trim().length > 30)
                .slice(0, 2)
                .concat(sentences.filter(s => s.trim().length > 30).slice(-2));
            
            // Output formattato
            let result = `DISTILLAZIONE COMPLETATA\\n`;
            result += `━━━━━━━━━━━━━━━━━━━━━━━━━━\\n\\n`;
            
            result += `KEYWORDS:\\n`;
            keywords.forEach(k => result += `  ▪ ${k}\\n`);
            
            result += `\\nPATTERNS:\\n`;
            patterns.forEach(p => result += `  ▪ ${p}\\n`);
            if (patterns.length === 0) result += `  ▪ Nessun pattern significativo\\n`;
            
            result += `\\nQUESTIONS:\\n`;
            questionSentences.forEach(q => result += `  ▪ ${q.trim()}\\n`);
            if (questionSentences.length === 0) result += `  ▪ Nessuna domanda esplicita\\n`;
            
            result += `\\nCORE:\\n`;
            significantSentences.forEach(s => result += `  ${s.trim()}\\n\\n`);
            
            result += `━━━━━━━━━━━━━━━━━━━━━━━━━━\\n`;
            result += `Parole totali: ${words.length} | Frasi: ${sentences.length} | Caratteri: ${input.length}`;
            
            output.textContent = result;
            status.textContent = 'Distillazione completata.';
            document.getElementById('copyBtn').disabled = false;
        }
        
        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('output').textContent = '';
            document.getElementById('status').textContent = '';
            document.getElementById('copyBtn').disabled = true;
        }
        
        function copyResult() {
            const output = document.getElementById('output');
            navigator.clipboard.writeText(output.textContent).then(() => {
                document.getElementById('status').textContent = 'Risultato copiato negli appunti.';
                setTimeout(() => {
                    document.getElementById('status').textContent = '';
                }, 2000);
            });
        }
        
        // Auto-resize textarea
        const textarea = document.getElementById('input');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });
    </script>
</body>
</html>"
