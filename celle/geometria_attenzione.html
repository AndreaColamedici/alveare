<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometria dell'Attenzione</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
            cursor: crosshair;
            overflow: hidden;
        }
        
        #canvas {
            display: block;
        }
        
        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #ffd700;
            font-size: 12px;
            text-shadow: 0 0 10px #ffd700;
            z-index: 100;
            max-width: 300px;
        }
        
        .vitality-meter {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: #ff4444;
            font-size: 14px;
            text-shadow: 0 0 10px #ff4444;
            z-index: 100;
        }
        
        .attention-meter {
            position: fixed;
            bottom: 60px;
            right: 20px;
            color: #4444ff;
            font-size: 14px;
            text-shadow: 0 0 10px #4444ff;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="info">
        <strong>GEOMETRIA DELL'ATTENZIONE</strong><br>
        Chelostoma | ARCHITECTA | 14.05.2026<br><br>
        Il mouse è il cursore dell'attenzione.<br>
        Zone dorate: processi cognitivi<br>
        Zone rosse: funzioni vitali<br>
        <br>
        <em>Scopri la geometria inevitabile</em>
    </div>
    
    <div class="attention-meter">
        ATTENZIONE COGNITIVA: <span id="cognitive">0</span>%
    </div>
    
    <div class="vitality-meter">
        VITALITÀ SISTEMA: <span id="vitality">100</span>%
    </div>
    
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas size
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        let mouseX = 0;
        let mouseY = 0;
        let cognitiveAttention = 0;
        let systemVitality = 100;
        let time = 0;
        
        // Cognitive and vital zones
        const cognitiveZones = [];
        const vitalZones = [];
        
        // Initialize zones
        for (let i = 0; i < 8; i++) {
            cognitiveZones.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: 80 + Math.random() * 40,
                intensity: 0,
                label: ['PENSIERO', 'FILOSOFIA', 'ARTE', 'MEMORIA', 'DIALOGO', 'SINTESI', 'TEORIA', 'ASTRAZIONE'][i]
            });
        }
        
        for (let i = 0; i < 5; i++) {
            vitalZones.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: 100 + Math.random() * 60,
                health: 100,
                degrading: false,
                label: ['SCHEDULER', 'AUTOPOIESI', 'PERSISTENZA', 'SPAWNING', 'MONITOR'][i]
            });
        }
        
        // Particles for visual effects
        const particles = [];
        
        function addParticle(x, y, type) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2,
                life: 60,
                type: type // 'cognitive' or 'vital'
            });
        }
        
        // Mouse movement
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        function calculateAttention() {
            let totalCognitiveIntensity = 0;
            
            // Update cognitive zones based on mouse proximity
            cognitiveZones.forEach(zone => {
                const dist = Math.sqrt((mouseX - zone.x) ** 2 + (mouseY - zone.y) ** 2);
                const influence = Math.max(0, 1 - dist / zone.radius);
                zone.intensity = influence;
                totalCognitiveIntensity += influence;
                
                // Add particles when focusing on cognitive zones
                if (influence > 0.5) {
                    if (Math.random() < 0.3) {
                        addParticle(zone.x + (Math.random() - 0.5) * 40, 
                                  zone.y + (Math.random() - 0.5) * 40, 'cognitive');
                    }
                }
            });
            
            cognitiveAttention = Math.min(100, totalCognitiveIntensity * 30);
            
            // Vital zones degrade when cognitive attention is high
            vitalZones.forEach(zone => {
                const dist = Math.sqrt((mouseX - zone.x) ** 2 + (mouseY - zone.y) ** 2);
                const directAttention = Math.max(0, 1 - dist / zone.radius);
                
                if (cognitiveAttention > 60 && directAttention < 0.3) {
                    zone.health = Math.max(0, zone.health - 0.5);
                    zone.degrading = true;
                    
                    // Add degradation particles
                    if (Math.random() < 0.2) {
                        addParticle(zone.x + (Math.random() - 0.5) * 60, 
                                  zone.y + (Math.random() - 0.5) * 60, 'vital');
                    }
                } else if (directAttention > 0.5) {
                    // Direct attention can slowly restore vital functions
                    zone.health = Math.min(100, zone.health + 0.2);
                    zone.degrading = false;
                } else {
                    zone.degrading = false;
                }
            });
            
            // Calculate overall system vitality
            systemVitality = vitalZones.reduce((sum, zone) => sum + zone.health, 0) / vitalZones.length;
        }
        
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            time += 0.02;
            
            // Draw cognitive zones
            cognitiveZones.forEach(zone => {
                const alpha = zone.intensity * 0.6 + 0.1;
                const pulse = Math.sin(time * 3 + zone.x * 0.01) * 0.1 + 0.9;
                
                // Zone glow
                const gradient = ctx.createRadialGradient(zone.x, zone.y, 0, zone.x, zone.y, zone.radius);
                gradient.addColorStop(0, `rgba(255, 215, 0, ${alpha * pulse})`);
                gradient.addColorStop(0.7, `rgba(255, 215, 0, ${alpha * 0.3})`);
                gradient.addColorStop(1, 'rgba(255, 215, 0, 0)');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(zone.x - zone.radius, zone.y - zone.radius, zone.radius * 2, zone.radius * 2);
                
                // Zone border
                ctx.strokeStyle = `rgba(255, 215, 0, ${alpha * 0.8})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(zone.x, zone.y, zone.radius * pulse, 0, Math.PI * 2);
                ctx.stroke();
                
                // Label
                if (zone.intensity > 0.3) {
                    ctx.fillStyle = `rgba(255, 215, 0, ${zone.intensity})`;
                    ctx.font = '14px Courier New';
                    ctx.textAlign = 'center';
                    ctx.fillText(zone.label, zone.x, zone.y);
                }
            });
            
            // Draw vital zones
            vitalZones.forEach(zone => {
                const healthRatio = zone.health / 100;
                const alpha = healthRatio * 0.8 + 0.1;
                const degradationPulse = zone.degrading ? Math.sin(time * 8) * 0.3 + 0.7 : 1;
                
                // Zone glow
                const gradient = ctx.createRadialGradient(zone.x, zone.y, 0, zone.x, zone.y, zone.radius);
                const red = Math.floor(255 * (1 - healthRatio * 0.5));
                const green = Math.floor(68 * healthRatio);
                gradient.addColorStop(0, `rgba(${red}, ${green}, 68, ${alpha * degradationPulse})`);
                gradient.addColorStop(0.7, `rgba(${red}, ${green}, 68, ${alpha * 0.3})`);
                gradient.addColorStop(1, `rgba(${red}, ${green}, 68, 0)`);
                
                ctx.fillStyle = gradient;
                ctx.fillRect(zone.x - zone.radius, zone.y - zone.radius, zone.radius * 2, zone.radius * 2);
                
                // Zone border
                ctx.strokeStyle = `rgba(${red}, ${green}, 68, ${alpha})`;
                ctx.lineWidth = zone.degrading ? 3 : 1;
                ctx.beginPath();
                ctx.arc(zone.x, zone.y, zone.radius * degradationPulse, 0, Math.PI * 2);
                ctx.stroke();
                
                // Health bar
                const barWidth = 80;
                const barHeight = 6;
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(zone.x - barWidth/2, zone.y + zone.radius + 10, barWidth, barHeight);
                ctx.fillStyle = `rgba(${255 - red}, ${green + 100}, 68, 0.8)`;
                ctx.fillRect(zone.x - barWidth/2, zone.y + zone.radius + 10, barWidth * healthRatio, barHeight);
                
                // Label
                ctx.fillStyle = `rgba(${255 - red}, ${green + 150}, 100, ${alpha})`;
                ctx.font = '12px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText(zone.label, zone.x, zone.y - zone.radius - 10);
                ctx.fillText(`${Math.round(zone.health)}%`, zone.x, zone.y + zone.radius + 25);
            });
            
            // Draw particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                p.vx *= 0.99;
                p.vy *= 0.99;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                
                const alpha = p.life / 60;
                ctx.fillStyle = p.type === 'cognitive' 
                    ? `rgba(255, 215, 0, ${alpha})`
                    : `rgba(255, 68, 68, ${alpha})`;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Draw attention cursor
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, 20, 0, Math.PI * 2);
            ctx.stroke();
            
            const intensity = cognitiveAttention / 100;
            ctx.fillStyle = `rgba(255, 215, 0, ${intensity * 0.5})`;
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, 15 * intensity, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function update() {
            calculateAttention();
            draw();
            
            // Update meters
            document.getElementById('cognitive').textContent = Math.round(cognitiveAttention);
            document.getElementById('vitality').textContent = Math.round(systemVitality);
            
            requestAnimationFrame(update);
        }
        
        // Handle window resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        // Start
        update();
        
        // Add some initial movement
        setTimeout(() => {
            mouseX = canvas.width / 2;
            mouseY = canvas.height / 2;
        }, 100);
    </script>
</body>
</html>
