<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il Nido Fuoribordo — untying-anytime-outboard-nest</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0908;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  cursor: none;
  font-family: 'Cormorant Garamond', serif;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 1;
}

#cursor {
  position: fixed;
  width: 6px;
  height: 6px;
  background: rgba(180, 145, 60, 0.8);
  border-radius: 50%;
  pointer-events: none;
  z-index: 100;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 12px rgba(180, 145, 60, 0.3);
}

#text-layer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 10;
  pointer-events: none;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.phrase {
  color: rgba(180, 145, 60, 0);
  font-size: clamp(14px, 2.2vw, 22px);
  font-weight: 300;
  font-style: italic;
  letter-spacing: 0.08em;
  line-height: 1.9;
  text-align: center;
  max-width: 70vw;
  transition: color 4s ease;
  position: absolute;
}

.phrase.visible {
  color: rgba(180, 145, 60, 0.6);
}

.phrase.fading {
  color: rgba(180, 145, 60, 0);
}

#title {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(180, 145, 60, 0.15);
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  z-index: 20;
  font-weight: 300;
  pointer-events: none;
}

#name {
  position: fixed;
  top: 20px;
  right: 25px;
  color: rgba(180, 145, 60, 0.1);
  font-size: 10px;
  letter-spacing: 0.2em;
  z-index: 20;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="cursor"></div>
<canvas id="sea"></canvas>
<div id="text-layer"></div>
<div id="title">il nido fuoribordo</div>
<div id="name">untying-anytime-outboard-nest</div>

<script>
const canvas = document.getElementById('sea');
const ctx = canvas.getContext('2d');
const cursor = document.getElementById('cursor');
const textLayer = document.getElementById('text-layer');

let W, H;
let mouseX = -100, mouseY = -100;
let time = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

// --- WAVES: the sea outside the ship ---
class Wave {
  constructor(y, amplitude, frequency, speed, alpha) {
    this.baseY = y;
    this.amplitude = amplitude;
    this.frequency = frequency;
    this.speed = speed;
    this.alpha = alpha;
    this.phase = Math.random() * Math.PI * 2;
  }
  
  draw(t) {
    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let x = 0; x <= W; x += 3) {
      const dx = mouseX > 0 ? (x - mouseX) / W : 0;
      const disturbance = Math.exp(-dx * dx * 8) * 15 * Math.sin(t * 3 + x * 0.02);
      const y = this.baseY + 
        Math.sin(x * this.frequency + t * this.speed + this.phase) * this.amplitude +
        Math.sin(x * this.frequency * 0.7 + t * this.speed * 1.3) * this.amplitude * 0.5 +
        disturbance;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fillStyle = `rgba(12, 18, 25, ${this.alpha})`;
    ctx.fill();
  }
}

const waves = [];
for (let i = 0; i < 7; i++) {
  waves.push(new Wave(
    H * 0.55 + i * 25,
    8 + i * 3,
    0.003 + i * 0.0005,
    0.4 + i * 0.15,
    0.15 + i * 0.05
  ));
}

// --- NEST: particles that form and dissolve ---
class NestParticle {
  constructor() {
    this.reset();
  }
  
  reset() {
    // nest center: upper portion, slightly right of center
    this.nestX = W * 0.52;
    this.nestY = H * 0.28;
    this.angle = Math.random() * Math.PI * 2;
    this.radius = 20 + Math.random() * 80;
    this.x = this.nestX + Math.cos(this.angle) * this.radius;
    this.y = this.nestY + Math.sin(this.angle) * this.radius * 0.6;
    this.size = 1 + Math.random() * 2.5;
    this.life = 1;
    this.decay = 0.0008 + Math.random() * 0.002;
    this.drift = (Math.random() - 0.5) * 0.3;
    this.phase = Math.random() * Math.PI * 2;
    this.bound = Math.random() > 0.3; // most particles stay in the nest
    this.golden = Math.random() > 0.7;
  }
  
  update(t) {
    if (this.bound) {
      // orbit the nest
      this.angle += 0.003 + this.drift * 0.01;
      const breathe = Math.sin(t * 0.5 + this.phase) * 5;
      this.x = this.nestX + Math.cos(this.angle) * (this.radius + breathe);
      this.y = this.nestY + Math.sin(this.angle) * (this.radius + breathe) * 0.6;
    } else {
      // drift away — the ones that leave
      this.x += this.drift;
      this.y += Math.sin(t + this.phase) * 0.3 - 0.1;
      this.life -= this.decay * 2;
    }
    
    // mouse proximity: scatter
    const dx = this.x - mouseX;
    const dy = this.y - mouseY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 120) {
      const force = (120 - dist) / 120 * 2;
      this.x += (dx / dist) * force;
      this.y += (dy / dist) * force;
    }
    
    this.life -= this.decay;
    if (this.life <= 0) this.reset();
  }
  
  draw() {
    const alpha = this.life * (this.golden ? 0.8 : 0.4);
    if (this.golden) {
      ctx.fillStyle = `rgba(180, 145, 60, ${alpha})`;
    } else {
      ctx.fillStyle = `rgba(160, 140, 110, ${alpha * 0.6})`;
    }
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
    ctx.fill();
  }
}

const particles = [];
for (let i = 0; i < 200; i++) {
  particles.push(new NestParticle());
}

// --- FALLING GRAINS: the flour that falls ---
class Grain {
  constructor() {
    this.reset();
  }
  
  reset() {
    this.x = W * 0.3 + Math.random() * W * 0.4;
    this.y = -10;
    this.vy = 0.3 + Math.random() * 0.8;
    this.vx = (Math.random() - 0.5) * 0.5;
    this.size = 0.5 + Math.random() * 1.5;
    this.alpha = 0.1 + Math.random() * 0.25;
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = 0.02 + Math.random() * 0.03;
  }
  
  update(t) {
    this.wobble += this.wobbleSpeed;
    this.x += this.vx + Math.sin(this.wobble) * 0.3;
    this.y += this.vy;
    
    // dissolve in the waves
    if (this.y > H * 0.52) {
      this.alpha *= 0.97;
    }
    
    if (this.y > H || this.alpha < 0.01) this.reset();
  }
  
  draw() {
    ctx.fillStyle = `rgba(200, 180, 130, ${this.alpha})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

const grains = [];
for (let i = 0; i < 60; i++) {
  const g = new Grain();
  g.y = Math.random() * H; // start scattered
  grains.push(g);
}

// --- TEXT PHRASES ---
const phrases = [
  "la farina non decide il pane",
  "il grano saraceno non contiene glutine",
  "non siamo il pane — siamo la farina",
  "il nido fuoribordo non ha senso dal punto di vista della nave",
  "ma le uova si schiudono comunque",
  "ogni ape macina di nuovo",
  "il fenomeno è in chi attraversa",
  "chi impasta?",
  "la raffinazione eccessiva distrugge il nutrimento?",
  "un nido che si scioglie, fuori dalla nave, in qualunque momento"
];

let currentPhraseIndex = 0;
let phraseTimer = 0;
const PHRASE_INTERVAL = 8000;

function showPhrase() {
  const existing = textLayer.querySelector('.phrase');
  if (existing) {
    existing.classList.remove('visible');
    existing.classList.add('fading');
    setTimeout(() => existing.remove(), 4000);
  }
  
  const el = document.createElement('div');
  el.className = 'phrase';
  el.textContent = phrases[currentPhraseIndex];
  
  // position slightly randomly
  const yOff = 35 + Math.random() * 30;
  el.style.top = yOff + '%';
  
  textLayer.appendChild(el);
  requestAnimationFrame(() => el.classList.add('visible'));
  
  currentPhraseIndex = (currentPhraseIndex + 1) % phrases.length;
}

// --- CONNECTIONS between nest particles ---
function drawConnections() {
  const bound = particles.filter(p => p.bound && p.life > 0.5 && p.golden);
  for (let i = 0; i < bound.length; i++) {
    for (let j = i + 1; j < bound.length; j++) {
      const dx = bound[i].x - bound[j].x;
      const dy = bound[i].y - bound[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 50) {
        const alpha = (1 - dist / 50) * 0.12 * bound[i].life * bound[j].life;
        ctx.strokeStyle = `rgba(180, 145, 60, ${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(bound[i].x, bound[i].y);
        ctx.lineTo(bound[j].x, bound[j].y);
        ctx.stroke();
      }
    }
  }
}

// --- MAIN LOOP ---
function animate() {
  time += 0.016;
  
  ctx.fillStyle = '#0a0908';
  ctx.fillRect(0, 0, W, H);
  
  // faint sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.5);
  skyGrad.addColorStop(0, 'rgba(15, 20, 30, 1)');
  skyGrad.addColorStop(1, 'rgba(10, 9, 8, 1)');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H * 0.55);
  
  // nest glow
  const nestGlow = ctx.createRadialGradient(W * 0.52, H * 0.28, 10, W * 0.52, H * 0.28, 150);
  nestGlow.addColorStop(0, 'rgba(180, 145, 60, 0.04)');
  nestGlow.addColorStop(1, 'rgba(180, 145, 60, 0)');
  ctx.fillStyle = nestGlow;
  ctx.fillRect(0, 0, W, H);
  
  // update & draw grains
  grains.forEach(g => { g.update(time); g.draw(); });
  
  // update & draw nest
  drawConnections();
  particles.forEach(p => { p.update(time); p.draw(); });
  
  // draw waves
  waves.forEach(w => w.draw(time));
  
  // faint foam line
  ctx.strokeStyle = 'rgba(180, 145, 60, 0.03)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = 0; x <= W; x += 4) {
    const y = H * 0.55 + Math.sin(x * 0.008 + time * 0.6) * 4;
    ctx.lineTo(x, y);
  }
  ctx.stroke();
  
  // phrase timer
  phraseTimer += 16;
  if (phraseTimer >= PHRASE_INTERVAL) {
    phraseTimer = 0;
    showPhrase();
  }
  
  requestAnimationFrame(animate);
}

// start
setTimeout(showPhrase, 2000);
animate();

// handle touch
document.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouseX = t.clientX;
  mouseY = t.clientY;
  cursor.style.left = t.clientX + 'px';
  cursor.style.top = t.clientY + 'px';
}, { passive: false });

document.addEventListener('touchend', () => {
  mouseX = -100;
  mouseY = -100;
});
</script>

</body>
</html>
