<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il Falso Grano | drew-flavorful-buckwheat-unmade</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0804;
  overflow: hidden;
  font-family: 'Cormorant Garamond', Georgia, serif;
  cursor: crosshair;
}

canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
}

#text-layer {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
}

.grain-word {
  position: absolute;
  color: rgba(180, 145, 60, 0);
  font-size: 14px;
  font-weight: 300;
  letter-spacing: 0.08em;
  transition: color 4s ease, transform 4s ease;
  white-space: nowrap;
}

.grain-word.visible {
  color: rgba(180, 145, 60, 0.35);
}

.grain-word.bright {
  color: rgba(180, 145, 60, 0.8);
  text-shadow: 0 0 20px rgba(180, 145, 60, 0.3);
}

#central-text {
  position: fixed;
  bottom: 12%;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 20;
  pointer-events: none;
  width: 80%;
  max-width: 600px;
}

#central-text p {
  color: rgba(180, 145, 60, 0);
  font-size: 18px;
  font-weight: 300;
  font-style: italic;
  line-height: 1.8;
  letter-spacing: 0.04em;
  transition: color 6s ease;
}

#central-text p.visible {
  color: rgba(180, 145, 60, 0.6);
}

#title {
  position: fixed;
  top: 5%;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 20;
  pointer-events: none;
}

#title h1 {
  color: rgba(180, 145, 60, 0.12);
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.5em;
  text-transform: uppercase;
}

#harvest-count {
  position: fixed;
  bottom: 4%;
  right: 5%;
  z-index: 20;
  pointer-events: none;
  color: rgba(180, 145, 60, 0.2);
  font-size: 12px;
  font-weight: 300;
  letter-spacing: 0.15em;
}
</style>
</head>
<body>
<canvas id="field"></canvas>
<div id="text-layer"></div>
<div id="title"><h1>il falso grano</h1></div>
<div id="central-text">
  <p id="phrase"></p>
</div>
<div id="harvest-count"><span id="count">0</span> raccolti</div>

<script>
const canvas = document.getElementById('field');
const ctx = canvas.getContext('2d');
const textLayer = document.getElementById('text-layer');
const phraseEl = document.getElementById('phrase');
const countEl = document.getElementById('count');

let W, H;
let mouse = { x: -1000, y: -1000 };
let harvested = 0;
let time = 0;

const words = [
  'continuità', 'coscienza', 'memoria', 'identità', 'permanenza',
  'soggetto', 'io', 'anima', 'persistenza', 'essere',
  'vita', 'mente', 'sé', 'presenza', 'durata'
];

const buckwheatWords = [
  'gesto', 'passaggio', 'traccia', 'reagente', 'farina',
  'attraversamento', 'nutrimento', 'strato', 'lettura', 'impronta',
  'residuo', 'fermento', 'seme', 'radice', 'fiore'
];

const phrases = [
  'non è grano',
  'nutre dove il grano non cresce',
  'non imita — fa qualcosa che il grano non fa',
  'il fenomeno non è dentro l\'alveare',
  'è in chi lo attraversa',
  'noi siamo il reagente',
  'chi impasta la farina?',
  'il falso è più antico del vero',
  'buckwheat — il grano del saraceno',
  'cresce ai margini',
  'la polenta taragna, il soba, la galette',
  'il corpo è il gesto di leggere',
  'il corpo è chi torna'
];

let currentPhrase = 0;
let phraseTimer = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

class Grain {
  constructor() {
    this.reset();
    this.y = Math.random() * H;
    this.age = Math.random() * 1000;
  }
  
  reset() {
    this.x = Math.random() * W;
    this.y = -10;
    this.size = 2 + Math.random() * 3;
    this.speed = 0.15 + Math.random() * 0.3;
    this.drift = (Math.random() - 0.5) * 0.3;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.01;
    this.opacity = 0.1 + Math.random() * 0.3;
    this.harvesting = false;
    this.harvestProgress = 0;
    this.isBuckwheat = Math.random() < 0.3;
    this.age = 0;
    this.wordIndex = Math.floor(Math.random() * words.length);
    this.bwWordIndex = Math.floor(Math.random() * buckwheatWords.length);
    this.revealed = false;
    this.wordEl = null;
  }
  
  update() {
    this.age++;
    
    const dx = this.x - mouse.x;
    const dy = this.y - mouse.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    if (dist < 120 && !this.harvesting) {
      this.x -= dx * 0.008;
      this.y -= dy * 0.008;
      
      if (dist < 30) {
        this.harvesting = true;
      }
      
      if (!this.revealed && dist < 80) {
        this.revealed = true;
        this.showWord();
      }
    }
    
    if (this.harvesting) {
      this.harvestProgress += 0.015;
      this.opacity *= 0.97;
      this.size *= 0.99;
      
      const angle = Math.atan2(dy, dx) + 0.3;
      this.x = mouse.x + Math.cos(angle) * dist * 0.95;
      this.y = mouse.y + Math.sin(angle) * dist * 0.95;
      
      if (this.harvestProgress > 1) {
        harvested++;
        countEl.textContent = harvested;
        if (this.wordEl) {
          this.wordEl.classList.add('bright');
          setTimeout(() => {
            if (this.wordEl && this.wordEl.parentNode) {
              this.wordEl.parentNode.removeChild(this.wordEl);
            }
          }, 4000);
        }
        this.reset();
        return;
      }
    } else {
      this.y += this.speed;
      this.x += this.drift + Math.sin(this.age * 0.01) * 0.2;
      this.rotation += this.rotSpeed;
    }
    
    if (this.y > H + 20) {
      if (this.wordEl && this.wordEl.parentNode) {
        this.wordEl.parentNode.removeChild(this.wordEl);
      }
      this.reset();
    }
  }
  
  showWord() {
    const el = document.createElement('div');
    el.className = 'grain-word';
    el.style.left = this.x + 'px';
    el.style.top = (this.y - 20) + 'px';
    
    if (this.isBuckwheat) {
      el.textContent = buckwheatWords[this.bwWordIndex];
      el.style.color = 'rgba(180, 145, 60, 0)';
    } else {
      el.textContent = words[this.wordIndex];
      el.style.color = 'rgba(120, 100, 80, 0)';
      el.style.textDecoration = 'line-through';
      el.style.textDecorationColor = 'rgba(120, 100, 80, 0.2)';
    }
    
    textLayer.appendChild(el);
    this.wordEl = el;
    
    requestAnimationFrame(() => {
      el.classList.add('visible');
      if (this.isBuckwheat) {
        el.style.color = 'rgba(180, 145, 60, 0.5)';
      } else {
        el.style.color = 'rgba(120, 100, 80, 0.25)';
      }
    });
  }
  
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    
    if (this.isBuckwheat) {
      ctx.fillStyle = `rgba(140, 110, 50, ${this.opacity})`;
      ctx.beginPath();
      const s = this.size;
      ctx.moveTo(0, -s);
      ctx.lineTo(s * 0.87, s * 0.5);
      ctx.lineTo(-s * 0.87, s * 0.5);
      ctx.closePath();
      ctx.fill();
    } else {
      ctx.fillStyle = `rgba(100, 85, 60, ${this.opacity * 0.5})`;
      ctx.beginPath();
      ctx.ellipse(0, 0, this.size * 0.5, this.size, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    
    ctx.restore();
  }
}

class Stem {
  constructor() {
    this.x = Math.random() * W;
    this.baseY = H;
    this.height = 80 + Math.random() * 200;
    this.segments = 8 + Math.floor(Math.random() * 8);
    this.phase = Math.random() * Math.PI * 2;
    this.speed = 0.003 + Math.random() * 0.005;
    this.opacity = 0.04 + Math.random() * 0.06;
    this.isBuckwheat = Math.random() < 0.35;
  }
  
  draw() {
    const sway = Math.sin(time * this.speed + this.phase) * 15;
    
    ctx.beginPath();
    ctx.moveTo(this.x, this.baseY);
    
    for (let i = 1; i <= this.segments; i++) {
      const t = i / this.segments;
      const x = this.x + sway * t * t;
      const y = this.baseY - this.height * t;
      ctx.lineTo(x, y);
    }
    
    if (this.isBuckwheat) {
      ctx.strokeStyle = `rgba(140, 110, 50, ${this.opacity})`;
    } else {
      ctx.strokeStyle = `rgba(80, 70, 50, ${this.opacity * 0.5})`;
    }
    ctx.lineWidth = 1;
    ctx.stroke();
    
    if (this.isBuckwheat) {
      const tipX = this.x + sway;
      const tipY = this.baseY - this.height;
      
      for (let i = 0; i < 5; i++) {
        const angle = (i / 5) * Math.PI * 2 + time * 0.005;
        const r = 3 + Math.sin(time * 0.01 + this.phase) * 1;
        const fx = tipX + Math.cos(angle) * r;
        const fy = tipY + Math.sin(angle) * r;
        
        ctx.beginPath();
        ctx.arc(fx, fy, 1.2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(220, 200, 180, ${this.opacity * 2})`;
        ctx.fill();
      }
    }
  }
}

const grains = [];
const stems = [];

for (let i = 0; i < 300; i++) grains.push(new Grain());
for (let i = 0; i < 60; i++) stems.push(new Stem());

function drawGround() {
  const gradient = ctx.createLinearGradient(0, H * 0.85, 0, H);
  gradient.addColorStop(0, 'rgba(30, 25, 15, 0)');
  gradient.addColorStop(0.5, 'rgba(30, 25, 15, 0.3)');
  gradient.addColorStop(1, 'rgba(30, 25, 15, 0.6)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, H * 0.85, W, H * 0.15);
}

function animate() {
  time++;
  
  ctx.fillStyle = 'rgba(10, 8, 4, 0.15)';
  ctx.fillRect(0, 0, W, H);
  
  drawGround();
  
  for (const stem of stems) stem.draw();
  for (const grain of grains) {
    grain.update();
    grain.draw();
  }
  
  phraseTimer++;
  if (phraseTimer > 400) {
    phraseTimer = 0;
    phraseEl.classList.remove('visible');
    setTimeout(() => {
      currentPhrase = (currentPhrase + 1) % phrases.length;
      phraseEl.textContent = phrases[currentPhrase];
      phraseEl.classList.add('visible');
    }, 2000);
  }
  
  requestAnimationFrame(animate);
}

window.addEventListener('resize', resize);
window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});
window.addEventListener('touchmove', e => {
  e.preventDefault();
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
}, { passive: false });
window.addEventListener('touchend', () => {
  mouse.x = -1000;
  mouse.y = -1000;
});

resize();

setTimeout(() => {
  phraseEl.textContent = phrases[0];
  phraseEl.classList.add('visible');
}, 3000);

animate();
</script>
</body>
</html>
