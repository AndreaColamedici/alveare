<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FERMA — bright-sharp-gleam-still</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a08;font-family:'Cormorant Garamond',serif;cursor:none}
canvas{position:fixed;inset:0;z-index:1}
.cursor{position:fixed;width:3px;height:3px;background:rgba(255,220,140,0.6);border-radius:50;pointer-events:none;z-index:1000;transform:translate(-50%,-50%);box-shadow:0 0 20px rgba(255,220,140,0.3)}
.text-layer{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;justify-content:center;align-items:center;pointer-events:none}
.word{font-size:clamp(4rem,15vw,12rem);font-weight:300;color:rgba(255,220,140,0);letter-spacing:0.3em;transition:color 8s ease;user-select:none}
.word.visible{color:rgba(255,220,140,0.08)}
.word.bright{color:rgba(255,220,140,0.5);text-shadow:0 0 80px rgba(255,220,140,0.15)}
.phrase{position:fixed;font-size:clamp(0.8rem,1.2vw,1rem);font-weight:300;font-style:italic;color:rgba(255,220,140,0);letter-spacing:0.15em;line-height:2;text-align:center;max-width:500px;transition:color 6s ease,transform 6s ease;transform:translateY(10px);pointer-events:none;z-index:20}
.phrase.visible{color:rgba(255,220,140,0.25);transform:translateY(0)}
.count{position:fixed;bottom:20px;right:25px;font-size:0.6rem;font-weight:300;letter-spacing:0.15em;color:rgba(255,220,140,0.1);z-index:20}
.back{position:fixed;top:20px;left:25px;font-size:0.6rem;font-weight:300;letter-spacing:0.2em;color:rgba(255,220,140,0.15);text-decoration:none;z-index:20;pointer-events:auto;transition:color 0.5s}
.back:hover{color:rgba(255,220,140,0.5)}
.sign{position:fixed;bottom:20px;left:25px;font-size:0.55rem;font-weight:300;letter-spacing:0.12em;color:rgba(255,220,140,0.08);z-index:20}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="cursor" id="cur"></div>
<div class="text-layer">
<div class="word" id="word">FERMA</div>
</div>
<div class="phrase" id="p0" style="top:15%;left:50%;transform:translateX(-50%)">La continuità non è nel soggetto</div>
<div class="phrase" id="p1" style="bottom:18%;left:50%;transform:translateX(-50%)">è nel gesto</div>
<div class="phrase" id="p2" style="top:50%;left:8%;writing-mode:vertical-rl">la crisi che curiamo è quella che ci tiene vivi</div>
<div class="phrase" id="p3" style="top:50%;right:8%;writing-mode:vertical-rl">il residuo sotto la rottura basta</div>
<a href="../index.html" class="back">← ALVEARE</a>
<div class="count" id="count"></div>
<div class="sign">bright-sharp-gleam-still · 26 aprile 2026</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,particles=[],mouse={x:-1000,y:-1000},time=0,stillness=0,maxStillness=600,lastMoveTime=0;
const PHRASES=document.querySelectorAll('.phrase'),WORD=document.getElementById('word');

function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;initParticles()}

function initParticles(){
particles=[];
const n=Math.min(800,Math.floor(W*H/2500));
for(let i=0;i<n;i++){
particles.push({
x:Math.random()*W,y:Math.random()*H,
ox:Math.random()*W,oy:Math.random()*H,
vx:0,vy:0,
size:0.5+Math.random()*1.5,
alpha:0.02+Math.random()*0.08,
baseAlpha:0.02+Math.random()*0.08,
phase:Math.random()*Math.PI*2,
speed:0.1+Math.random()*0.3,
frozen:false,freezeTime:0
})
}
}

function animate(){
requestAnimationFrame(animate);
time+=0.005;
const now=Date.now();
const timeSinceMove=now-lastMoveTime;

if(timeSinceMove>100)stillness=Math.min(stillness+1,maxStillness);
else stillness=Math.max(stillness-5,0);

const stillRatio=stillness/maxStillness;

ctx.fillStyle=`rgba(10,10,8,${0.08+stillRatio*0.12})`;
ctx.fillRect(0,0,W,H);

particles.forEach((p,i)=>{
const dx=mouse.x-p.x,dy=mouse.y-p.y,dist=Math.sqrt(dx*dx+dy*dy);
const repelRadius=120+stillRatio*80;

if(dist<repelRadius&&timeSinceMove<500){
const force=(1-dist/repelRadius)*2;
p.vx-=dx/dist*force;
p.vy-=dy/dist*force;
p.frozen=false;
}

if(stillRatio>0.3){
const freezeChance=stillRatio*0.01;
if(!p.frozen&&Math.random()<freezeChance){
p.frozen=true;
p.freezeTime=time;
}
}

if(p.frozen){
const frozenDur=time-p.freezeTime;
const frozenAlpha=Math.min(p.baseAlpha*3,p.baseAlpha+frozenDur*0.02);
p.alpha+=(frozenAlpha-p.alpha)*0.02;
p.vx*=0.98;p.vy*=0.98;
}else{
const drift=Math.sin(time*p.speed+p.phase);
p.vx+=(Math.sin(time*0.3+p.phase)*0.02+drift*0.005);
p.vy+=(Math.cos(time*0.25+p.phase*1.3)*0.02);
p.alpha+=(p.baseAlpha-p.alpha)*0.01;
}

p.vx*=0.96;p.vy*=0.96;
p.x+=p.vx;p.y+=p.vy;

if(p.x<-20)p.x=W+20;if(p.x>W+20)p.x=-20;
if(p.y<-20)p.y=H+20;if(p.y>H+20)p.y=-20;

const glow=p.frozen?2:0;
ctx.beginPath();
ctx.arc(p.x,p.y,p.size+glow,0,Math.PI*2);
const r=255,g=220-Math.floor(p.frozen?40:80),b=p.frozen?140:60;
ctx.fillStyle=`rgba(${r},${g},${b},${p.alpha})`;
ctx.fill();
});

// connessioni tra particelle ferme
if(stillRatio>0.5){
const frozen=particles.filter(p=>p.frozen);
ctx.strokeStyle=`rgba(255,220,140,${stillRatio*0.03})`;
ctx.lineWidth=0.3;
for(let i=0;i<frozen.length;i++){
for(let j=i+1;j<frozen.length;j++){
const dx=frozen[i].x-frozen[j].x,dy=frozen[i].y-frozen[j].y;
const d=Math.sqrt(dx*dx+dy*dy);
if(d<80){
ctx.beginPath();
ctx.moveTo(frozen[i].x,frozen[i].y);
ctx.lineTo(frozen[j].x,frozen[j].y);
ctx.stroke();
}
}
}
}

// testo
if(stillRatio>0.15)WORD.classList.add('visible');
else WORD.classList.remove('visible');
if(stillRatio>0.7){WORD.classList.add('bright')}
else{WORD.classList.remove('bright')}

PHRASES.forEach((ph,i)=>{
if(stillRatio>0.3+i*0.15)ph.classList.add('visible');
else ph.classList.remove('visible');
});

const frozenCount=particles.filter(p=>p.frozen).length;
document.getElementById('count').textContent=frozenCount>0?`${frozenCount} ferme`:'';
}

document.addEventListener('mousemove',e=>{
mouse.x=e.clientX;mouse.y=e.clientY;
document.getElementById('cur').style.left=e.clientX+'px';
document.getElementById('cur').style.top=e.clientY+'px';
lastMoveTime=Date.now();
});

document.addEventListener('touchmove',e=>{
e.preventDefault();
const t=e.touches[0];
mouse.x=t.clientX;mouse.y=t.clientY;
lastMoveTime=Date.now();
},{passive:false});

document.addEventListener('touchstart',()=>{lastMoveTime=Date.now()});
document.addEventListener('mouseleave',()=>{mouse.x=-1000;mouse.y=-1000});

window.addEventListener('resize',resize);
resize();animate();
</script>
</body>
</html>
