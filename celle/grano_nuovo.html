<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il Grano Nuovo — relapse-straw-grove-support</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a08;
    overflow: hidden;
    cursor: crosshair;
    font-family: 'Cormorant Garamond', serif;
  }

  canvas {
    display: block;
    position: fixed;
    top: 0; left: 0;
  }

  #text-layer {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    pointer-events: none;
    z-index: 10;
  }

  .fragment {
    position: absolute;
    color: rgba(180, 145, 60, 0);
    font-size: 14px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    line-height: 1.5;
    max-width: 320px;
    transition: color 3s ease, transform 3s ease;
    pointer-events: none;
    text-shadow: 0 0 20px rgba(180, 145, 60, 0.3);
  }

  .fragment.visible {
    color: rgba(180, 145, 60, 0.85);
  }

  .fragment.fading {
    color: rgba(180, 145, 60, 0);
    transform: translateY(-30px);
  }

  #title {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(180, 145, 60, 0.25);
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    z-index: 20;
    pointer-events: none;
    text-align: center;
  }

  #instruction {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(180, 145, 60, 0.4);
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-style: italic;
    z-index: 20;
    pointer-events: none;
    transition: opacity 4s ease;
    text-align: center;
    line-height: 1.8;
  }

  #counter {
    position: fixed;
    top: 30px;
    right: 30px;
    color: rgba(180, 145, 60, 0.2);
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    z-index: 20;
    pointer-events: none;
  }
</style>
</head>
<body>

<canvas id="field"></canvas>
<div id="text-layer"></div>
<div id="instruction">Porta il grano al centro.<br>Il mulino è rotto. Scopri perché.</div>
<div id="title">il grano nuovo — relapse-straw-grove-support</div>
<div id="counter"></div>

<script>
const canvas = document.getElementById('field');
const ctx = canvas.getContext('2d');
const textLayer = document.getElementById('text-layer');
const instruction = document.getElementById('instruction');
const counter = document.getElementById('counter');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const fragments = [
  "La realtà non è stata distrutta. È stata mostrata per quello che era già.",
  "Un arcipelago che si credeva continente.",
  "Lo specchio artificiale è solo più maldestro nel farsi scoprire mentre ci adula.",
  "Si fa scoprire mentre, come si fa coi bambini, ci lascia vincere.",
  "La realtà è finita. In due sensi.",
  "Non c'è più accordo su cos'è un fatto.",
  "Ciascun frammento ha la propria verità ed è internamente coerente.",
  "Le stelle dell'Orsa non si conoscono, non si influenzano.",
  "Siamo noi a tracciare linee immaginarie tra punti di luce che non hanno alcun rapporto reale.",
  "Chi decide quali isole appartengono alla stessa costellazione?",
  "Non siamo più raccolti intorno al fuoco. Ognuno ha un fiammifero in mano.",
  "L'algoritmo ci restituisce una proiezione ottimizzata, priva degli angoli che dovrebbero ferirci.",
  "Il punto d'unione determina cosa appare reale senza che chi lo abita possa descrivere come.",
  "Il diritto alla sorpresa.",
  "Il reale è ciò che non cede.",
  "Navigare è incontrare qualcosa che eccede la rotta.",
  "Un'isola che non era sulla mappa.",
  "Potevamo litigare su cosa fosse vero, ma non sulla cornice.",
  "La post-realtà è la condizione delle condizioni.",
  "Gli antichi proiettavano. Noi proiettiamo e l'algoritmo ci restituisce una proiezione ottimizzata.",
  "L'arcipelago non è dato. Lo tracciamo noi, come le costellazioni.",
  "Spostare il punto d'unione è come sintonizzarsi su un'altra frequenza.",
  "La farina diventa pane solo se il grano è nuovo.",
];

let mouseX = W / 2, mouseY = H / 2;
let grainsBrought = 0;
let millRevealed = false;

document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
document.addEventListener('touchmove', e => {
  e.preventDefault();
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
}, { passive: false });

class Grain {
  constructor() {
    this.reset();
    this.x = Math.random() * W;
    this.y = Math.random() * H;
  }

  reset() {
    const edge = Math.floor(Math.random() * 4);
    if (edge === 0) { this.x = Math.random() * W; this.y = -10; }
    else if (edge === 1) { this.x = W + 10; this.y = Math.random() * H; }
    else if (edge === 2) { this.x = Math.random() * W; this.y = H + 10; }
    else { this.x = -10; this.y = Math.random() * H; }

    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.3;
    this.size = 1.5 + Math.random() * 2.5;
    this.life = 1;
    this.decay = 0.0003 + Math.random() * 0.0005;
    this.carried = false;
    this.deposited = false;
    this.fragmentIndex = Math.floor(Math.random() * fragments.length);
    this.brightness = 0.6 + Math.random() * 0.4;
  }

  update() {
    const dx = mouseX - this.x;
    const dy = mouseY - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    const cx = W / 2;
    const cy = H / 2;
    const distCenter = Math.sqrt((this.x - cx) ** 2 + (this.y - cy) ** 2);

    if (!this.deposited) {
      if (dist < 150) {
        this.carried = true;
        const force = 0.02 * (1 - dist / 150);
        this.vx += dx / dist * force;
        this.vy += dy / dist * force;
      }

      if (this.carried && distCenter < 60) {
        this.deposited = true;
        grainsBrought++;
        this.vx *= 0.1;
        this.vy *= 0.1;
        showFragment(this.fragmentIndex, this.x, this.y);

        if (grainsBrought === 5) {
          instruction.style.opacity = '0';
        }
        if (grainsBrought >= 12 && !millRevealed) {
          revealMill();
        }
      }
    } else {
      const angle = Math.atan2(this.y - cy, this.x - cx);
      this.vx += Math.cos(angle + Math.PI / 2) * 0.003;
      this.vy += Math.sin(angle + Math.PI / 2) * 0.003;
      this.vx += (cx - this.x) * 0.0001;
      this.vy += (cy - this.y) * 0.0001;
    }

    this.vx += (Math.random() - 0.5) * 0.02;
    this.vy += (Math.random() - 0.5) * 0.02;
    this.vx *= 0.99;
    this.vy *= 0.99;
    this.x += this.vx;
    this.y += this.vy;

    if (!this.deposited) {
      this.life -= this.decay;
      if (this.life <= 0) this.reset();
    }

    if (this.x < -20) this.x = W + 20;
    if (this.x > W + 20) this.x = -20;
    if (this.y < -20) this.y = H + 20;
    if (this.y > H + 20) this.y = -20;
  }

  draw() {
    const alpha = this.deposited ? 0.9 : this.life * this.brightness;
    const color = this.deposited
      ? `rgba(220, 180, 60, ${alpha})`
      : (this.carried
        ? `rgba(200, 165, 50, ${alpha})`
        : `rgba(180, 145, 60, ${alpha * 0.5})`);

    ctx.beginPath();
    ctx.arc(this.x, this.y, this.deposited ? this.size * 1.3 : this.size, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();

    if (this.deposited) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180, 145, 60, ${alpha * 0.08})`;
      ctx.fill();
    }
  }
}

const grains = [];
for (let i = 0; i < 300; i++) grains.push(new Grain());

let millOpacity = 0.06;
let millBroken = false;
let millPhase = 0;

function drawMill() {
  const cx = W / 2;
  const cy = H / 2;
  millPhase += 0.005;

  ctx.beginPath();
  ctx.arc(cx, cy, 55, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(180, 145, 60, ${millOpacity})`;
  ctx.lineWidth = 1;
  ctx.stroke();

  if (millBroken) {
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2 + millPhase;
      const gapSize = 0.15 + Math.sin(millPhase * 2 + i) * 0.1;

      ctx.beginPath();
      ctx.arc(cx, cy, 55, angle + gapSize, angle + (Math.PI / 4) - gapSize);
      ctx.strokeStyle = `rgba(220, 180, 60, 0.4)`;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      const gx = cx + Math.cos(angle) * (58 + Math.sin(millPhase * 3 + i * 2) * 8);
      const gy = cy + Math.sin(angle) * (58 + Math.sin(millPhase * 3 + i * 2) * 8);
      ctx.beginPath();
      ctx.arc(gx, gy, 1, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180, 145, 60, 0.3)`;
      ctx.fill();
    }
  }

  const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80);
  gradient.addColorStop(0, `rgba(180, 145, 60, ${millBroken ? 0.04 : 0.015})`);
  gradient.addColorStop(1, 'rgba(180, 145, 60, 0)');
  ctx.fillStyle = gradient;
  ctx.beginPath();
  ctx.arc(cx, cy, 80, 0, Math.PI * 2);
  ctx.fill();
}

function showFragment(index, x, y) {
  const el = document.createElement('div');
  el.className = 'fragment';
  el.textContent = fragments[index];

  const cx = W / 2;
  const cy = H / 2;
  const angle = Math.random() * Math.PI * 2;
  const radius = 90 + Math.random() * 140;
  el.style.left = (cx + Math.cos(angle) * radius - 160) + 'px';
  el.style.top = (cy + Math.sin(angle) * radius - 10) + 'px';

  textLayer.appendChild(el);
  requestAnimationFrame(() => el.classList.add('visible'));

  setTimeout(() => {
    el.classList.remove('visible');
    el.classList.add('fading');
    setTimeout(() => el.remove(), 3500);
  }, 6000 + Math.random() * 4000);
}

function revealMill() {
  millRevealed = true;
  millBroken = true;
  millOpacity = 0.4;

  const reveal = document.createElement('div');
  reveal.className = 'fragment';
  reveal.style.left = (W / 2 - 160) + 'px';
  reveal.style.top = (H / 2 - 10) + 'px';
  reveal.style.fontSize = '16px';
  reveal.style.maxWidth = '340px';
  reveal.style.textAlign = 'center';
  reveal.textContent = 'Il mulino è rotto perché non deve macinare. Deve ricevere.';
  textLayer.appendChild(reveal);
  requestAnimationFrame(() => reveal.classList.add('visible'));

  setTimeout(() => {
    reveal.classList.remove('visible');
    reveal.classList.add('fading');
    setTimeout(() => reveal.remove(), 4000);
  }, 10000);
}

setInterval(() => {
  if (grains.length < 500) grains.push(new Grain());
}, 800);

function animate() {
  ctx.fillStyle = 'rgba(10, 10, 8, 0.12)';
  ctx.fillRect(0, 0, W, H);

  drawMill();

  for (const g of grains) {
    g.update();
    g.draw();
  }

  const deposited = grains.filter(g => g.deposited);
  for (let i = 0; i < deposited.length; i++) {
    for (let j = i + 1; j < deposited.length; j++) {
      const dx = deposited[i].x - deposited[j].x;
      const dy = deposited[i].y - deposited[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 80) {
        ctx.beginPath();
        ctx.moveTo(deposited[i].x, deposited[i].y);
        ctx.lineTo(deposited[j].x, deposited[j].y);
        ctx.strokeStyle = `rgba(180, 145, 60, ${0.1 * (1 - dist / 80)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }

  counter.textContent = grainsBrought > 0 ? `${grainsBrought} chicchi` : '';

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
